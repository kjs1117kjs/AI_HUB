<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조회화면 구성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --blue:#2f89ee; --blue-dark:#2278df; --blue-soft:#e9f2fd;
    --head-bg:#e9f1fa; --grid-head:#edf3fa; --label-bg:#f6f9fc;
    --border:#d3dce8; --border-soft:#e1e8f1; --sel:#cfe0f5;
    --text:#333a44; --text-sub:#69707a; --white:#fff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-size:12.5px;color:var(--text);background:#eef1f5;-webkit-font-smoothing:antialiased;}
  .wrap{padding:16px;max-width:1720px;margin:0 auto;}

  /* ===== Builder toolbar ===== */
  .builder{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .builder-top{background:#eef4fb;border-bottom:1px solid #c9dcf1;padding:10px 14px;font-weight:700;color:#2c3742;font-size:13px;display:flex;align-items:center;gap:8px;border-radius:6px 6px 0 0;}
  .builder-top .hint{margin-left:auto;font-weight:500;color:#7a828d;font-size:11.5px;}
  .builder-sec{padding:12px 14px;border-bottom:1px solid var(--border-soft);display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .builder-sec:last-child{border-bottom:none;}
  .sec-title{font-weight:700;color:#3a4551;font-size:12px;width:110px;flex-shrink:0;}
  .b-txt{height:30px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;}
  .b-txt:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(47,137,238,.14);}
  .b-sel{height:30px;border:1px solid var(--border);border-radius:4px;padding:0 26px 0 10px;font-family:inherit;font-size:12.5px;background:#fff;appearance:none;-webkit-appearance:none;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 9px center;}
  .b-chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#4a5563;cursor:pointer;user-select:none;}
  .type-btn{border:1px solid var(--border);background:#f7fafd;color:#2c3742;padding:7px 13px;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;white-space:nowrap;}
  .type-btn:hover{background:var(--blue-soft);border-color:var(--blue);color:var(--blue-dark);}
  .type-btn.accent{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .type-btn.accent:hover{background:var(--blue-dark);}
  .type-btn.ghost{background:#fff;color:#5a6472;}
  .divider-v{width:1px;height:22px;background:var(--border-soft);margin:0 2px;}

  /* ===== Buttons ===== */
  .btn{border:1px solid var(--border);background:#fff;color:#42505f;padding:5px 12px;border-radius:3px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;line-height:1.4;white-space:nowrap;}
  .btn:hover{background:#f4f6f9;}
  .btn-primary{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-sm{padding:4px 9px;font-size:11.5px;}
  .btn-ghost{background:#f7f9fb;color:#5a6472;}

  /* ===== Preview panel ===== */
  .panel{background:var(--white);border:1px solid var(--border);border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .panel-head{display:flex;align-items:center;gap:8px;background:#e9f1fa;border-bottom:1px solid #c9dcf1;padding:9px 14px;border-radius:4px 4px 0 0;}
  .panel-head .caret{cursor:pointer;color:#3f5670;font-size:12px;line-height:1;user-select:none;transition:transform .2s;display:inline-block;}
  .panel-head.collapsed .caret{transform:rotate(-90deg);}
  .panel-head .title{font-weight:700;font-size:13px;color:#2c3742;}
  .panel-head .title-input{font-weight:700;font-size:13px;color:#2c3742;border:1px dashed transparent;background:transparent;font-family:inherit;padding:2px 6px;border-radius:3px;min-width:220px;}
  .panel-head .title-input:hover,.panel-head .title-input:focus{border-color:#b7cbe6;background:#fff;outline:none;}
  .panel-head .actions{margin-left:auto;display:flex;gap:6px;}

  .search-body{padding:0;overflow:hidden;transition:max-height .25s ease;}
  table.search{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.search th,table.search td{border:1px solid var(--border-soft);padding:0;height:38px;vertical-align:middle;}
  table.search th{background:var(--label-bg);color:#495260;font-weight:600;text-align:left;padding:0 14px;width:130px;font-size:12px;}
  table.search td{padding:5px 10px;background:#fff;}
  table.search colgroup col.c-lbl{width:130px;}
  table.search td.has-ctrl{position:relative;}
  .empty-cond{text-align:center;color:#9aa2ac;height:60px;background:#fafbfc;}
  .fld-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
  .ext-row.ext-hidden{display:none;}
  .ext-badge{display:inline-block;margin-left:6px;font-size:10px;color:#fff;background:#f0a020;border-radius:8px;padding:1px 6px;font-weight:700;vertical-align:middle;}

  input.txt,select.cmb{height:28px;border:1px solid var(--border);border-radius:3px;padding:0 8px;font-family:inherit;font-size:12px;color:var(--text);background:#fff;width:100%;outline:none;}
  input.txt:focus,select.cmb:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(47,137,238,.12);}
  input.txt[readonly]{background:#fff;cursor:pointer;}
  select.cmb{appearance:none;-webkit-appearance:none;background:#fff;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:24px;cursor:pointer;}
  .grow{flex:1;min-width:0;}
  .date-wrap,.month-wrap{position:relative;width:150px;}
  .date-wrap input,.month-wrap input{padding-right:26px;cursor:pointer;}
  .pick-btn{position:absolute;right:1px;top:1px;bottom:1px;width:24px;border:none;background:transparent;cursor:pointer;color:#5b6470;display:flex;align-items:center;justify-content:center;}
  .tilde{color:#8b939d;padding:0 2px;}
  .select-box{height:28px;border:1px solid var(--border);border-radius:3px;background:#fff;display:flex;align-items:center;padding:0 8px;font-size:12px;cursor:pointer;flex:1;min-width:0;color:var(--text);}
  .select-box.empty{color:#9aa2ac;}
  .select-box:hover{border-color:var(--blue);}
  .select-box .val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lbl-input{width:100%;height:26px;border:1px dashed #c1cddd;border-radius:3px;padding:0 6px;font-family:inherit;font-size:12px;background:#fff;color:#2c3742;font-weight:600;outline:none;}
  .lbl-input:focus{border-color:var(--blue);border-style:solid;}

  /* cell edit controls */
  .cell-ctrl{position:absolute;top:3px;right:4px;display:flex;gap:2px;z-index:3;}
  .cell-ctrl button{width:20px;height:20px;border:1px solid var(--border);background:#fff;border-radius:3px;cursor:pointer;font-size:11px;line-height:1;color:#5a6472;padding:0;display:flex;align-items:center;justify-content:center;}
  .cell-ctrl button:hover{background:#eef4fb;}
  .cell-ctrl button.on{background:#f0a020;color:#fff;border-color:#dc8f14;}
  .cell-ctrl button.del:hover{background:#fdecec;color:#d0433c;border-color:#f0b4b1;}

  /* excel bar */
  .excel-bar{display:flex;justify-content:flex-end;gap:6px;padding:10px 2px;}

  /* grid */
  .grid-outer{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  .grid-scroll{overflow-x:auto;overflow-y:auto;max-height:460px;}
  table.grid{border-collapse:collapse;font-size:12px;white-space:nowrap;min-width:100%;}
  table.grid thead th{position:sticky;top:0;z-index:2;background:var(--grid-head);color:#34404d;font-weight:700;border:1px solid #cdd7e2;border-top:none;padding:0;text-align:center;height:38px;}
  table.grid thead th .col-hd{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px 8px;position:relative;}
  table.grid thead th .col-input{width:100%;min-width:70px;height:26px;border:1px dashed #c1cddd;border-radius:3px;padding:0 4px;font-family:inherit;font-size:12px;text-align:center;background:#fff;font-weight:700;color:#34404d;outline:none;}
  table.grid thead th .col-input:focus{border-color:var(--blue);border-style:solid;}
  table.grid tbody td{border:1px solid #e6e9ee;padding:7px 8px;color:#3d4550;text-align:center;height:32px;}
  table.grid tbody tr:nth-child(even) td{background:#fafbfc;}
  table.grid td.rownum{background:#f2f4f7;color:#6b7480;font-weight:600;width:36px;}
  table.grid tfoot td{position:sticky;bottom:0;z-index:2;background:#eef1f5;border:1px solid #cdd7e2;padding:7px 8px;font-weight:700;color:#2c3742;text-align:center;}
  .col-gear{width:36px;background:var(--grid-head);}
  .empty-grid{padding:50px 0;text-align:center;color:#9aa2ac;font-size:13px;}

  /* description */
  .desc-box{background:#fff;border:1px solid var(--border);border-radius:4px;margin-top:14px;padding:14px 16px;}
  .desc-box label{display:block;font-weight:700;color:#3a4551;font-size:12.5px;margin-bottom:8px;}
  .desc-box textarea{width:100%;min-height:90px;border:1px solid var(--border);border-radius:4px;padding:10px 12px;font-family:inherit;font-size:13px;line-height:1.6;color:var(--text);resize:vertical;outline:none;}
  .desc-box textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(47,137,238,.12);}

  /* calendar & month popup */
  .cal{position:absolute;z-index:9999;background:#fff;border:1px solid #b9c2ce;border-radius:6px;box-shadow:0 8px 26px rgba(30,45,70,.22);padding:10px;width:240px;font-size:12px;display:none;}
  .cal.open{display:block;}
  .cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .cal-hd .nav{border:none;background:#f1f4f8;width:26px;height:26px;border-radius:4px;cursor:pointer;color:#4a5563;font-size:14px;}
  .cal-hd .nav:hover{background:#e4e9f0;}
  .cal-hd .ym{font-weight:700;color:#2c3742;}
  .cal table{width:100%;border-collapse:collapse;}
  .cal th{color:#8a929c;font-weight:600;padding:4px 0;font-size:11px;}
  .cal td{text-align:center;padding:0;}
  .cal td button{width:100%;height:28px;border:none;background:transparent;cursor:pointer;border-radius:4px;font-size:12px;color:#3d4550;font-family:inherit;}
  .cal td button:hover{background:var(--blue-soft);}
  .cal td button.today{color:var(--blue);font-weight:700;}
  .cal td button.on{background:var(--blue);color:#fff;font-weight:700;}
  .cal td button.mute{color:#c3c9d1;}
  .cal td button.sun{color:#d9534f;}
  .cal td button.sat{color:#3a6fb0;}
  .cal-ft{display:flex;justify-content:space-between;margin-top:8px;}
  .cal-ft button{border:none;background:transparent;color:var(--blue);cursor:pointer;font-size:12px;font-weight:600;}
  .month-pop{width:212px;}
  .month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .month-grid button{height:34px;border:1px solid var(--border-soft);background:#fff;border-radius:4px;cursor:pointer;font-size:12px;color:#3d4550;font-family:inherit;}
  .month-grid button:hover{background:var(--blue-soft);border-color:var(--blue);}
  .month-grid button.on{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;}

  /* modal */
  .modal-mask{position:fixed;inset:0;background:rgba(20,28,40,.4);display:none;align-items:flex-start;justify-content:center;z-index:1000;padding:60px 16px;}
  .modal-mask.open{display:flex;}
  .modal{background:#fff;border-radius:6px;box-shadow:0 14px 44px rgba(0,0,0,.3);width:660px;max-width:100%;max-height:calc(100vh - 120px);display:flex;flex-direction:column;}
  .modal-hd{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid #e6e9ee;}
  .modal-hd .mt{font-size:15px;font-weight:700;color:#2c3742;}
  .modal-hd .x{margin-left:auto;border:none;background:transparent;cursor:pointer;font-size:20px;color:#8a929c;line-height:1;}
  .modal-hd .x:hover{color:#333;}
  .modal-body{padding:16px 18px;overflow:auto;}
  .m-search{width:100%;border-collapse:collapse;margin-bottom:12px;}
  .m-search td{padding:4px 6px;}
  .m-search td.ml{width:80px;color:#5a6472;font-size:12px;font-weight:600;}
  .m-search input,.m-search select{height:28px;border:1px solid var(--border);border-radius:3px;padding:0 8px;width:100%;font-family:inherit;font-size:12px;}
  .m-search select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:24px;}
  .m-btns{display:flex;justify-content:flex-end;gap:6px;margin-bottom:8px;}
  .m-grid-wrap{border:1px solid var(--border);border-radius:3px;max-height:340px;overflow:auto;}
  table.m-grid{width:100%;border-collapse:collapse;font-size:12px;}
  table.m-grid thead th{position:sticky;top:0;background:var(--grid-head);border-bottom:1px solid #cdd7e2;padding:7px 8px;color:#34404d;font-weight:700;text-align:left;}
  table.m-grid tbody td{border-bottom:1px solid #eef0f3;padding:6px 8px;color:#3d4550;}
  table.m-grid tbody tr{cursor:pointer;}
  table.m-grid tbody tr:hover td{background:#eef5fd;}
  table.m-grid td.chk{text-align:center;width:34px;}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;}
  .badge.open{background:#e5f4ec;color:#1c8a52;}
  .badge.close{background:#fdecec;color:#d0433c;}
  .filter-btn{border:1px solid var(--blue);color:var(--blue);background:#fff;height:28px;border-radius:3px;padding:0 12px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
  .tree{border:1px solid var(--border);border-radius:3px;max-height:360px;overflow:auto;padding:8px 4px;}
  .tree ul{list-style:none;margin:0;padding-left:18px;}
  .tree>ul{padding-left:4px;}
  .tree li{padding:2px 0;}
  .tree label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;color:#3d4550;padding:2px 4px;border-radius:3px;}
  .tree label:hover{background:#f2f6fb;}
  .tree .tw{cursor:pointer;display:inline-block;width:14px;color:#8a929c;user-select:none;}

  body.preview .cell-ctrl,body.preview .col-hd .cell-ctrl{display:none!important;}
  body.preview .lbl-input,body.preview .col-input{border-color:transparent;background:transparent;cursor:default;pointer-events:none;}
  body.preview .title-input{pointer-events:none;}
</style>
</head>
<body class="edit">
<div class="wrap">

  <!-- ============ BUILDER ============ -->
  <div class="builder">
    <div class="builder-top">
      🧩 조회화면 구성기
      <span class="hint">버튼을 누르면 아래 화면에 조회조건·컬럼이 순서대로 추가됩니다.</span>
    </div>

    <!-- 조회조건 추가 -->
    <div class="builder-sec">
      <span class="sec-title">조회조건 추가</span>
      <input class="b-txt" id="condName" placeholder="조회조건명 (예: 조회일자)" style="width:190px;">
      <label class="b-chk"><input type="checkbox" id="condRange"> 기간(~)</label>
      <label class="b-chk"><input type="checkbox" id="condExt"> 확장조회 항목</label>
      <span class="divider-v"></span>
      <button class="type-btn" data-add="date">📅 일자달력</button>
      <button class="type-btn" data-add="month">🗓️ 월달력</button>
      <button class="type-btn" data-add="text">🔤 텍스트박스</button>
      <button class="type-btn" data-add="cat">🗂️ 분류조회</button>
      <button class="type-btn" data-add="store">🏬 매장선택</button>
      <button class="type-btn" data-add="prod">📦 상품선택</button>
      <button class="type-btn ghost" data-add="blank">▫️ 빈 조회조건</button>
    </div>

    <!-- 콤보박스 조회조건 -->
    <div class="builder-sec">
      <span class="sec-title">콤보박스 조건</span>
      <input class="b-txt" id="comboName" placeholder="콤보박스명 (예: 매장브랜드)" style="width:190px;">
      <input class="b-txt" id="comboOpts" placeholder="옵션 (쉼표 구분: 전체,미스터피자,BBQ)" style="width:320px;">
      <button class="type-btn accent" id="addCombo">＋ 콤보박스 추가</button>
    </div>

    <!-- 결과 컬럼 추가 -->
    <div class="builder-sec">
      <span class="sec-title">결과 컬럼 추가</span>
      <input class="b-txt" id="colName" placeholder="컬럼명 (예: 매장명)" style="width:190px;">
      <select class="b-sel" id="colAlign">
        <option value="c">가운데</option>
        <option value="l">왼쪽</option>
        <option value="r">오른쪽(숫자)</option>
      </select>
      <button class="type-btn accent" id="addCol">＋ 컬럼 추가</button>
      <span class="hint" style="margin-left:4px;">추가한 순서대로 결과 표 헤더에 들어갑니다.</span>
    </div>

    <!-- 화면 설정 -->
    <div class="builder-sec">
      <span class="sec-title">화면 설정</span>
      <button class="btn" id="modeBtn">👁 미리보기 모드</button>
      <button class="btn" id="clearAll">전체 초기화</button>
      <span class="divider-v"></span>
      <button class="btn" id="saveCfg">💾 설정 저장(JSON)</button>
      <button class="btn" id="loadCfg">📂 불러오기</button>
      <input type="file" id="loadFile" accept=".json" style="display:none;">
      <button class="btn" id="sampleBtn">예시 채우기</button>
    </div>
  </div>

  <!-- ============ PREVIEW SCREEN ============ -->
  <div class="panel">
    <div class="panel-head" id="panelHead">
      <span class="caret" id="caret">▼</span>
      <input class="title-input" id="titleInput" value="화면 제목을 입력하세요">
      <div class="actions">
        <button class="btn btn-primary" id="btnExt">확장조회</button>
        <button class="btn btn-primary" id="btnSearch">조회</button>
      </div>
    </div>
    <div class="search-body" id="searchBody">
      <table class="search">
        <colgroup><col class="c-lbl"><col><col class="c-lbl"><col></colgroup>
        <tbody id="condBody"></tbody>
      </table>
    </div>
  </div>

  <div class="excel-bar">
    <button class="btn" id="btnExcel">현재화면 엑셀다운로드</button>
  </div>

  <div class="grid-outer">
    <div class="grid-scroll" id="gridScroll"></div>
  </div>

  <div class="desc-box">
    <label for="descArea">화면 설명</label>
    <textarea id="descArea" placeholder="이 화면의 용도, 조회 조건, 결과 항목 등에 대한 설명을 적어주세요."></textarea>
  </div>
</div>

<!-- calendar -->
<div class="cal" id="calPop">
  <div class="cal-hd"><button class="nav" id="calPrev">‹</button><span class="ym" id="calYm"></span><button class="nav" id="calNext">›</button></div>
  <table><thead><tr><th style="color:#d9534f">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th style="color:#3a6fb0">토</th></tr></thead><tbody id="calBody"></tbody></table>
  <div class="cal-ft"><button id="calToday">오늘</button><button id="calClose">닫기</button></div>
</div>
<!-- month -->
<div class="cal month-pop" id="monthPop">
  <div class="cal-hd"><button class="nav" id="monthPrev">‹</button><span class="ym" id="monthYr"></span><button class="nav" id="monthNext">›</button></div>
  <div class="month-grid" id="monthGrid"></div>
  <div class="cal-ft" style="justify-content:flex-end;"><button id="monthClose">닫기</button></div>
</div>
<!-- modal -->
<div class="modal-mask" id="modalMask"><div class="modal" id="modalBox"></div></div>

<script>
/* ================= 상태 ================= */
let seq = 1;
const state = { title:'화면 제목을 입력하세요', conditions:[], columns:[], desc:'', extShown:false, queried:true };

const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const findCond = id => state.conditions.find(c=>c.id===id);
const findCol  = id => state.columns.find(k=>k.id===id);
const isEdit   = () => !document.body.classList.contains('preview');
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return fmt(new Date());}
function monthNowStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
const CAL_ICON = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5" stroke="#5b6470"/><path d="M1.5 5.5h13M5 1v3M11 1v3" stroke="#5b6470"/></svg>';
const CARET_ICON = '<svg width="10" height="6" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z" fill="#6b7684"/></svg>';

/* ================= 추가 핸들러 ================= */
const $ = id => document.getElementById(id);
document.querySelectorAll('[data-add]').forEach(b=>{
  b.onclick=()=>addCondition(b.dataset.add);
});
function addCondition(type){
  const name = $('condName').value.trim();
  const ext  = $('condExt').checked;
  const range= $('condRange').checked;
  if(type!=='blank' && !name){ alert('조회조건명을 입력하세요.'); $('condName').focus(); return; }
  state.conditions.push({id:'c'+(seq++), type, label:type==='blank'?'':name, range, ext, options:[]});
  $('condName').value=''; render();
}
$('addCombo').onclick=()=>{
  const name=$('comboName').value.trim();
  const opts=$('comboOpts').value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!name){ alert('콤보박스명을 입력하세요.'); return; }
  if(!opts.length){ alert('콤보박스 옵션을 입력하세요.'); return; }
  state.conditions.push({id:'c'+(seq++), type:'combo', label:name, range:false, ext:$('condExt').checked, options:opts});
  $('comboName').value=''; $('comboOpts').value=''; render();
};
$('addCol').onclick=()=>{
  const name=$('colName').value.trim();
  if(!name){ alert('컬럼명을 입력하세요.'); $('colName').focus(); return; }
  state.columns.push({id:'k'+(seq++), name, align:$('colAlign').value});
  $('colName').value=''; render();
};

/* ================= 렌더 ================= */
function packRows(conds){
  const normal=conds.filter(c=>!c.ext), ext=conds.filter(c=>c.ext), rows=[];
  for(let i=0;i<normal.length;i+=2) rows.push({ext:false, cells:[normal[i], normal[i+1]||null]});
  for(let i=0;i<ext.length;i+=2)    rows.push({ext:true,  cells:[ext[i], ext[i+1]||null]});
  return rows;
}
function fieldHTML(c){
  switch(c.type){
    case 'date':  return rangeWrap(c,'date');
    case 'month': return rangeWrap(c,'month');
    case 'text':  return `<div class="fld-row"><input class="txt" placeholder=""></div>`;
    case 'combo': return `<div class="fld-row"><select class="cmb">${c.options.map(o=>`<option>${esc(o)}</option>`).join('')}</select></div>`;
    case 'cat':   return popupField(c,'cat','분류조회 선택');
    case 'store': return popupField(c,'store','전체');
    case 'prod':  return popupField(c,'prod','전체');
    case 'blank': return '';
  }
  return '';
}
function rangeWrap(c,kind){
  const cls = kind==='date'?'date-wrap':'month-wrap';
  const jcls= kind==='date'?'js-date':'js-month';
  const jbtn= kind==='date'?'js-date-btn':'js-month-btn';
  const val = kind==='date'?todayStr():monthNowStr();
  const icon= kind==='date'?CAL_ICON:CARET_ICON;
  const one = `<div class="${cls}"><input class="txt ${jcls}" readonly value="${val}"><button class="pick-btn ${jbtn}" type="button">${icon}</button></div>`;
  return `<div class="fld-row">${one}${c.range?`<span class="tilde">~</span>${one}`:''}</div>`;
}
function popupField(c,type,ph){
  return `<div class="fld-row">
    <div class="select-box grow empty" id="${c.id}_box" data-popup="${type}"><span class="val">${ph}</span></div>
    <button class="btn btn-sm btn-ghost" data-clear="${c.id}_box">선택취소</button>
  </div>`;
}
function condCtrl(c){
  return `<div class="cell-ctrl">
    <button data-act="up" data-cid="${c.id}" title="위로">▲</button>
    <button data-act="down" data-cid="${c.id}" title="아래로">▼</button>
    <button data-act="ext" data-cid="${c.id}" class="${c.ext?'on':''}" title="확장조회 항목">확</button>
    <button data-act="del" data-cid="${c.id}" class="del" title="삭제">✕</button>
  </div>`;
}
function cellHTML(c){
  if(!c) return `<th></th><td></td>`;
  const th = isEdit()
    ? `<th><input class="lbl-input" data-cid="${c.id}" value="${esc(c.label)}" placeholder="${c.type==='blank'?'(빈칸)':'조건명'}"></th>`
    : `<th>${esc(c.label)}${c.ext?'<span class="ext-badge">확장</span>':''}</th>`;
  const td = `<td class="has-ctrl">${fieldHTML(c)}${isEdit()?condCtrl(c):''}</td>`;
  return th+td;
}
function renderConditions(){
  const body=$('condBody');
  if(state.conditions.length===0){ body.innerHTML=`<tr><td class="empty-cond" colspan="4">상단 버튼으로 조회조건을 추가하세요.</td></tr>`; return; }
  let html='';
  packRows(state.conditions).forEach(row=>{
    html+=`<tr class="${row.ext?'ext-row':''}">${cellHTML(row.cells[0])}${cellHTML(row.cells[1])}</tr>`;
  });
  body.innerHTML=html;
  applyExt();
}
function applyExt(){
  const hide = !isEdit() && !state.extShown;
  document.querySelectorAll('#condBody .ext-row').forEach(r=>r.classList.toggle('ext-hidden', hide));
}
function colCtrl(k){
  return `<div class="cell-ctrl" style="position:static;margin-left:2px;">
    <button data-act="cleft" data-kid="${k.id}" title="왼쪽">◀</button>
    <button data-act="cright" data-kid="${k.id}" title="오른쪽">▶</button>
    <button data-act="cdel" data-kid="${k.id}" class="del" title="삭제">✕</button>
  </div>`;
}
function renderGrid(){
  const box=$('gridScroll');
  if(state.columns.length===0){ box.innerHTML=`<div class="empty-grid">‘결과 컬럼 추가’로 표 컬럼을 만들어 주세요.</div>`; return; }
  let h='<table class="grid"><thead><tr><th class="col-gear">⚙</th>';
  state.columns.forEach(k=>{
    const inner = isEdit()
      ? `<input class="col-input" data-kid="${k.id}" value="${esc(k.name)}">${colCtrl(k)}`
      : `<span>${esc(k.name)}</span>`;
    h+=`<th><div class="col-hd">${inner}</div></th>`;
  });
  h+='</tr></thead><tbody>';
  const rowCnt = state.queried ? 5 : 0;
  for(let r=0;r<rowCnt;r++){
    h+=`<tr><td class="rownum">${r+1}</td>`;
    state.columns.forEach(k=>{ h+=`<td class="${k.align==='l'?'l':k.align==='r'?'r':''}">&nbsp;</td>`; });
    h+='</tr>';
  }
  if(rowCnt===0){ h+=`<tr><td class="rownum">&nbsp;</td><td colspan="${state.columns.length}" style="color:#9aa2ac;">조회 버튼을 눌러 조회하세요.</td></tr>`; }
  h+='</tbody><tfoot><tr><td>합계</td>';
  state.columns.forEach(k=>{ h+=`<td class="${k.align==='r'?'r':''}">&nbsp;</td>`; });
  h+='</tr></tfoot></table>';
  box.innerHTML=h;
}
function render(){ renderConditions(); renderGrid(); }

/* ================= 인라인 편집(포커스 유지 위해 render 없이 상태만) ================= */
document.addEventListener('input', e=>{
  const t=e.target;
  if(t.classList.contains('lbl-input')){ const c=findCond(t.dataset.cid); if(c) c.label=t.value; }
  else if(t.classList.contains('col-input')){ const k=findCol(t.dataset.kid); if(k) k.name=t.value; }
  else if(t.id==='descArea'){ state.desc=t.value; }
  else if(t.id==='titleInput'){ state.title=t.value; }
});

/* ================= 액션(이동/삭제/확장) ================= */
document.addEventListener('click', e=>{
  const act=e.target.closest('[data-act]'); if(!act) return;
  const {act:a, cid, kid}=act.dataset;
  if(cid){
    const arr=state.conditions, i=arr.findIndex(c=>c.id===cid);
    if(a==='up'&&i>0){ [arr[i-1],arr[i]]=[arr[i],arr[i-1]]; }
    else if(a==='down'&&i<arr.length-1){ [arr[i+1],arr[i]]=[arr[i],arr[i+1]]; }
    else if(a==='del'){ arr.splice(i,1); }
    else if(a==='ext'){ arr[i].ext=!arr[i].ext; }
    render();
  } else if(kid){
    const arr=state.columns, i=arr.findIndex(k=>k.id===kid);
    if(a==='cleft'&&i>0){ [arr[i-1],arr[i]]=[arr[i],arr[i-1]]; }
    else if(a==='cright'&&i<arr.length-1){ [arr[i+1],arr[i]]=[arr[i],arr[i+1]]; }
    else if(a==='cdel'){ arr.splice(i,1); }
    render();
  }
});

/* ================= 엑셀 ================= */
$('btnExcel').onclick=()=>{
  if(state.columns.length===0){ alert('결과 컬럼을 먼저 추가하세요.'); return; }
  const header=['No', ...state.columns.map(k=>k.name)];
  const body=[]; for(let r=0;r<5;r++){ body.push([r+1, ...state.columns.map(()=>'')]); }
  const foot=['합계', ...state.columns.map(()=>'')];
  const ws=XLSX.utils.aoa_to_sheet([header,...body,foot]);
  ws['!cols']=[{wch:5},...state.columns.map(k=>({wch:Math.max(10,k.name.length*2)}))];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, (state.title||'화면').substring(0,28));
  XLSX.writeFile(wb, (state.title||'조회화면')+'.xlsx');
};

/* ================= 설정 저장/불러오기 ================= */
$('saveCfg').onclick=()=>{
  const data=JSON.stringify({title:state.title,conditions:state.conditions,columns:state.columns,desc:state.desc},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=(state.title||'화면구성')+'.json'; a.click();
};
$('loadCfg').onclick=()=>$('loadFile').click();
$('loadFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result);
    state.title=o.title||''; state.conditions=o.conditions||[]; state.columns=o.columns||[]; state.desc=o.desc||'';
    state.conditions.forEach(c=>{ if(!c.id)c.id='c'+(seq++); }); state.columns.forEach(k=>{ if(!k.id)k.id='k'+(seq++); });
    $('titleInput').value=state.title; $('descArea').value=state.desc; render();
  }catch(err){ alert('불러오기 실패: 올바른 설정 파일이 아닙니다.'); } };
  rd.readAsText(f); e.target.value='';
};

/* ================= 달력 ================= */
const cal={pop:$('calPop'),body:$('calBody'),ym:$('calYm'),target:null,view:new Date()};
function parseDate(s){const p=(s||'').split('-');return p.length===3?new Date(+p[0],+p[1]-1,+p[2]):new Date();}
function drawCal(){
  const y=cal.view.getFullYear(),m=cal.view.getMonth();
  cal.ym.textContent=`${y}년 ${m+1}월`;
  const start=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  const today=todayStr(),sel=cal.target?cal.target.value:'';
  let cells=[];
  for(let i=start-1;i>=0;i--)cells.push({d:prev-i,mo:m-1,mute:true});
  for(let d=1;d<=days;d++)cells.push({d,mo:m});
  while(cells.length%7!==0)cells.push({d:cells.length-(start+days)+1,mo:m+1,mute:true});
  let html='';
  cells.forEach((c,i)=>{ if(i%7===0)html+='<tr>';
    const ds=fmt(new Date(y,c.mo,c.d)),dow=i%7;let cls='';
    if(c.mute)cls+=' mute';else{if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';}
    if(ds===today)cls+=' today';if(ds===sel)cls+=' on';
    html+=`<td><button class="${cls.trim()}" data-date="${ds}">${c.d}</button></td>`; if(i%7===6)html+='</tr>';});
  cal.body.innerHTML=html;
  cal.body.querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(cal.target)cal.target.value=b.dataset.date; closeCal();});
}
function openCalFor(input){ cal.target=input; cal.view=parseDate(input.value);
  const r=input.closest('.date-wrap').getBoundingClientRect();
  cal.pop.style.left=(window.scrollX+r.left)+'px'; cal.pop.style.top=(window.scrollY+r.bottom+4)+'px';
  cal.pop.classList.add('open'); drawCal(); }
function closeCal(){cal.pop.classList.remove('open');}
$('calPrev').onclick=()=>{cal.view.setMonth(cal.view.getMonth()-1);drawCal();};
$('calNext').onclick=()=>{cal.view.setMonth(cal.view.getMonth()+1);drawCal();};
$('calToday').onclick=()=>{if(cal.target)cal.target.value=todayStr();closeCal();};
$('calClose').onclick=closeCal;

/* ================= 월 선택 ================= */
const mon={pop:$('monthPop'),grid:$('monthGrid'),yr:$('monthYr'),target:null,year:new Date().getFullYear()};
function parseMonth(s){const p=(s||'').split('-');return{y:+p[0],m:+p[1]};}
function drawMonth(){
  mon.yr.textContent=mon.year+'년';
  const cur=mon.target?parseMonth(mon.target.value):{};let html='';
  for(let m=1;m<=12;m++){const on=(cur.y===mon.year&&cur.m===m)?'on':'';html+=`<button class="${on}" data-m="${m}">${m}월</button>`;}
  mon.grid.innerHTML=html;
  mon.grid.querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(mon.target)mon.target.value=mon.year+'-'+String(+b.dataset.m).padStart(2,'0'); closeMonth();});
}
function openMonthFor(input){ mon.target=input; const cur=parseMonth(input.value); mon.year=cur.y||new Date().getFullYear();
  const r=input.closest('.month-wrap').getBoundingClientRect();
  mon.pop.style.left=(window.scrollX+r.right-212)+'px'; mon.pop.style.top=(window.scrollY+r.bottom+4)+'px';
  mon.pop.classList.add('open'); drawMonth(); }
function closeMonth(){mon.pop.classList.remove('open');}
$('monthPrev').onclick=()=>{mon.year--;drawMonth();};
$('monthNext').onclick=()=>{mon.year++;drawMonth();};
$('monthClose').onclick=closeMonth;

/* ================= 통합 click 위임 (달력/월/팝업/선택취소/외부닫기) ================= */
document.addEventListener('click', e=>{
  const dateHit=e.target.closest('.js-date, .js-date-btn');
  const monHit =e.target.closest('.js-month, .js-month-btn');
  const box    =e.target.closest('.select-box[data-popup]');
  const clr    =e.target.closest('[data-clear]');
  if(dateHit){ openCalFor(dateHit.closest('.date-wrap').querySelector('.js-date')); closeMonth(); e.stopPropagation(); return; }
  if(monHit){ openMonthFor(monHit.closest('.month-wrap').querySelector('.js-month')); closeCal(); e.stopPropagation(); return; }
  if(box){ if(isEdit()){} openPopup(box.dataset.popup, box.id); return; }
  if(clr){ clearBox(clr.dataset.clear); return; }
  if(!e.target.closest('#calPop')) closeCal();
  if(!e.target.closest('#monthPop')) closeMonth();
});

const STORE_DATA=[['001060MP','미스터피자 야탑점','오픈',''],['001070MP','미스터피자 신흥점','오픈',''],['001130MP','미스터피자 산본점','오픈',''],['001190MP','미스터피자 부평점','오픈',''],['001200MP','미스터피자 중동점','오픈',''],['001290MP','미스터피자 상계점','오픈',''],['001340MP','미스터피자 잠실점','오픈',''],['001370MP','미스터피자 의정부금오점','오픈',''],['001430MP','미스터피자 명일점','오픈',''],['001470MP','미스터피자 수지점','폐점',''],['001560MP','미스터피자 강릉옥천점','오픈',''],['001690MP','미스터피자 밀양점','오픈',''],['C00023','피자앤치킨 서초점','오픈','제한']];
const PROD_DATA=[['0101000740','쉬림프골드'],['0101000760','포테이토골드'],['0101000770','하프앤하프'],['0101001070','새우천왕'],['0101001120','치즈블라썸스테이크'],['0101001170','미스터트리오 골드'],['0101001400','레전드바질마스카포네 골드'],['0101001470','콰트로치즈 골드'],['0101001480','스페셜콰트로'],['0101001490','트리플 올인원'],['0101001500','멕시칸 치폴레']];
const CAT_TREE=[{name:'사이드',children:['감자류','소스','치킨류']},{name:'옵션',children:['옵션','토핑','사이즈']},{name:'기타',children:['추가금액','포장','배달']},{name:'맘스세트',children:['피치세트','콤보세트']},{name:'피자',children:['프리미엄','스테디','신제품']}];

const mask=$('modalMask'),modalBox=$('modalBox');
function openModal(){mask.classList.add('open');}
function closeModal(){mask.classList.remove('open');}
mask.addEventListener('click',e=>{if(e.target===mask)closeModal();});
function bindX(){const x=modalBox.querySelector('[data-x]');if(x)x.onclick=closeModal;}
function setBoxValue(boxId,text){const b=$(boxId);if(!b)return;b.querySelector('.val').textContent=text;b.classList.toggle('empty',!text||text==='전체'||text==='분류조회 선택');}
function clearBox(boxId){ setBoxValue(boxId, boxId.includes('_box')&&$(boxId)?.dataset.popup==='cat' ? '분류조회 선택':'전체'); }

function openPopup(type,boxId){ if(type==='store')buildStore(boxId); else if(type==='prod')buildProd(boxId); else if(type==='cat')buildCat(boxId); openModal(); }

function buildStore(boxId){
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">매장선택</span><button class="x" data-x>&times;</button></div>
  <div class="modal-body">
    <table class="m-search">
      <tr><td class="ml">매장코드</td><td><input id="fsc"></td><td class="ml">매장명</td><td><input id="fsn"></td></tr>
      <tr><td class="ml">매장상태</td><td><select><option>전체</option><option>오픈</option><option>폐점</option></select></td><td class="ml">지역구분</td><td><select><option>전체</option><option>수도권</option><option>영남</option><option>호남</option></select></td></tr>
      <tr><td class="ml">매장</td><td colspan="3"><div style="display:flex;gap:6px;"><input id="fsk" style="flex:1"><button class="filter-btn" id="sf">필터</button></div></td></tr>
    </table>
    <div class="m-btns"><button class="btn btn-primary btn-sm" id="sap">선택</button><button class="btn btn-sm" id="srl">조회</button></div>
    <div class="m-grid-wrap"><table class="m-grid"><thead><tr><th class="chk"><input type="checkbox" id="sall"></th><th>매장코드</th><th>매장명</th><th>상태</th><th>판매가제한</th></tr></thead><tbody id="sbody"></tbody></table></div>
  </div>`;
  bindX();const body=modalBox.querySelector('#sbody');let cur=STORE_DATA.slice();
  const draw=l=>{ body.innerHTML=l.map((r,i)=>`<tr><td class="chk"><input type="checkbox" class="sc" value="${i}"></td><td>${r[0]}</td><td>${r[1]}</td><td><span class="badge ${r[2]==='오픈'?'open':'close'}">${r[2]}</span></td><td>${r[3]}</td></tr>`).join('');
    body.querySelectorAll('tr').forEach(tr=>tr.onclick=e=>{if(e.target.type!=='checkbox'){const c=tr.querySelector('.sc');c.checked=!c.checked;}}); };
  draw(cur);
  modalBox.querySelector('#sall').onchange=e=>body.querySelectorAll('.sc').forEach(c=>c.checked=e.target.checked);
  const flt=()=>{const kw=(modalBox.querySelector('#fsk').value+modalBox.querySelector('#fsc').value+modalBox.querySelector('#fsn').value).trim();cur=kw?STORE_DATA.filter(r=>(r[0]+r[1]).includes(kw)):STORE_DATA.slice();draw(cur);};
  modalBox.querySelector('#sf').onclick=flt;modalBox.querySelector('#srl').onclick=flt;
  modalBox.querySelector('#sap').onclick=()=>{const p=[...body.querySelectorAll('.sc:checked')].map(c=>cur[+c.value]);if(!p.length){alert('매장을 선택하세요.');return;}setBoxValue(boxId,p.length===1?p[0][1]:`${p[0][1]} 외 ${p.length-1}건`);closeModal();};
}
function buildProd(boxId){
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">상품선택</span><button class="x" data-x>&times;</button></div>
  <div class="modal-body">
    <table class="m-search">
      <tr><td class="ml">상품코드</td><td><input id="fpc"></td><td class="ml">상품명</td><td><input id="fpn"></td></tr>
      <tr><td class="ml">상품브랜드</td><td><select><option>전체</option><option>미스터피자</option></select></td><td class="ml">상품</td><td><div style="display:flex;gap:6px;"><input id="fpk" style="flex:1"><button class="filter-btn" id="pf">필터</button></div></td></tr>
    </table>
    <div class="m-btns"><button class="btn btn-sm" id="prl">조회</button><button class="btn btn-primary btn-sm" id="pap">선택</button></div>
    <div class="m-grid-wrap"><table class="m-grid"><thead><tr><th class="chk"><input type="checkbox" id="pall"></th><th>상품코드</th><th>상품명</th></tr></thead><tbody id="pbody"></tbody></table></div>
  </div>`;
  bindX();const body=modalBox.querySelector('#pbody');let cur=PROD_DATA.slice();
  const draw=l=>{ body.innerHTML=l.map((r,i)=>`<tr><td class="chk"><input type="checkbox" class="pc" value="${i}"></td><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
    body.querySelectorAll('tr').forEach(tr=>tr.onclick=e=>{if(e.target.type!=='checkbox'){const c=tr.querySelector('.pc');c.checked=!c.checked;}}); };
  draw(cur);
  modalBox.querySelector('#pall').onchange=e=>body.querySelectorAll('.pc').forEach(c=>c.checked=e.target.checked);
  const flt=()=>{const kw=(modalBox.querySelector('#fpk').value+modalBox.querySelector('#fpc').value+modalBox.querySelector('#fpn').value).trim();cur=kw?PROD_DATA.filter(r=>(r[0]+r[1]).includes(kw)):PROD_DATA.slice();draw(cur);};
  modalBox.querySelector('#pf').onclick=flt;modalBox.querySelector('#prl').onclick=flt;
  modalBox.querySelector('#pap').onclick=()=>{const p=[...body.querySelectorAll('.pc:checked')].map(c=>cur[+c.value]);if(!p.length){alert('상품을 선택하세요.');return;}setBoxValue(boxId,p.length===1?p[0][1]:`${p[0][1]} 외 ${p.length-1}건`);closeModal();};
}
function buildCat(boxId){
  let tree='<div class="tree"><ul>';
  CAT_TREE.forEach((g,gi)=>{tree+=`<li><span class="tw" data-tw="${gi}">▾</span><label><input type="checkbox" class="cp" data-g="${gi}"> <b>${g.name}</b></label><ul data-ul="${gi}">${g.children.map(c=>`<li><label><input type="checkbox" class="cc" data-g="${gi}"> ${c}</label></li>`).join('')}</ul></li>`;});
  tree+='</ul></div>';
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">분류조회</span><button class="x" data-x>&times;</button></div><div class="modal-body">${tree}<div class="m-btns" style="margin-top:12px;"><button class="btn btn-primary btn-sm" id="cap">선택</button><button class="btn btn-sm" id="ccl">취소</button></div></div>`;
  bindX();
  modalBox.querySelectorAll('[data-tw]').forEach(tw=>tw.onclick=()=>{const ul=modalBox.querySelector(`[data-ul="${tw.dataset.tw}"]`);const h=ul.style.display==='none';ul.style.display=h?'':'none';tw.textContent=h?'▾':'▸';});
  modalBox.querySelectorAll('.cp').forEach(p=>p.onchange=()=>modalBox.querySelectorAll(`.cc[data-g="${p.dataset.g}"]`).forEach(c=>c.checked=p.checked));
  modalBox.querySelector('#ccl').onclick=closeModal;
  modalBox.querySelector('#cap').onclick=()=>{const names=[];CAT_TREE.forEach((g,gi)=>{const parent=modalBox.querySelector(`.cp[data-g="${gi}"]`);const kids=[...modalBox.querySelectorAll(`.cc[data-g="${gi}"]`)];if(parent.checked&&kids.every(k=>k.checked))names.push(g.name);else kids.forEach((k,ki)=>{if(k.checked)names.push(g.name+'>'+g.children[ki]);});});if(!names.length){alert('분류를 선택하세요.');return;}setBoxValue(boxId,names.length===1?names[0]:`${names[0]} 외 ${names.length-1}건`);closeModal();};
}

/* ================= 초기 렌더 ================= */
render();
</script>
</body>
</html>
