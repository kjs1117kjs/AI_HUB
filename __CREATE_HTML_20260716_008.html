<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>조회화면 구성기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --blue:#2f89ee; --blue-dark:#2278df; --blue-soft:#e9f2fd;
    --head-bg:#e9f1fa; --grid-head:#e8e8e8; --grid-grp:#dcdcdc; --label-bg:#f6f9fc;
    --grid-line:#c4c4c4; --grid-head-tx:#333333;
    /* 연파랑(soft) : 333.jpg 의 [조회조건 엑셀다운로드] / [선택취소] 버튼 색 */
    --soft-bg:#ebf5ff; --soft-bg-h:#dbebfd; --soft-bd:#a8c0d8; --soft-bd-h:#7fa6cc; --soft-tx:#3f6ba8;
    /* 회색(gray) */
    --gray-bg:#e8e8e8; --gray-bg-h:#dcdcdc; --gray-bd:#c9c9c9; --gray-bd-h:#b5b5b5; --gray-tx:#333333;
    --border:#d3dce8; --border-soft:#e1e8f1; --sel:#cfe0f5;
    --text:#333a44; --text-sub:#69707a; --white:#fff; --danger:#e0554e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;font-size:12.5px;color:var(--text);background:#eef1f5;-webkit-font-smoothing:antialiased;}
  .wrap{padding:16px;max-width:1720px;margin:0 auto;}
  .builder{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .builder-top{background:#eef4fb;border-bottom:1px solid #c9dcf1;padding:10px 14px;font-weight:700;color:#2c3742;font-size:13px;display:flex;align-items:center;gap:8px;border-radius:6px 6px 0 0;}
  .builder-top .hint{margin-left:auto;font-weight:500;color:#7a828d;font-size:11.5px;}
  .builder-sec{padding:11px 14px;border-bottom:1px solid var(--border-soft);display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
  .builder-sec:last-child{border-bottom:none;}
  .builder-sec.target-sec{background:#fafcff;}
  .sec-title{font-weight:700;color:#3a4551;font-size:12px;width:96px;flex-shrink:0;}
  .b-txt{height:30px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;}
  .b-txt:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(47,137,238,.14);}
  .b-sel{height:30px;border:1px solid var(--border);border-radius:4px;padding:0 26px 0 10px;font-family:inherit;font-size:12.5px;background:#fff;appearance:none;-webkit-appearance:none;cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 9px center;}
  .b-chk{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#4a5563;cursor:pointer;user-select:none;}
  .type-btn{border:1px solid var(--border);background:#f7fafd;color:#2c3742;padding:7px 12px;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;white-space:nowrap;}
  .type-btn:hover{background:var(--blue-soft);border-color:var(--blue);color:var(--blue-dark);}
  .type-btn.accent{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .type-btn.accent:hover{background:var(--blue-dark);}
  .type-btn.ghost{background:#fff;color:#5a6472;}
  .divider-v{width:1px;height:22px;background:var(--border-soft);margin:0 2px;}
  .btn{border:1px solid var(--border);background:#fff;color:#42505f;padding:5px 12px;border-radius:3px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;line-height:1.4;white-space:nowrap;}
  .btn:hover{background:#f4f6f9;}
  .btn-primary{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-sm{padding:4px 9px;font-size:11.5px;}
  .btn-ghost{background:#f7f9fb;color:#5a6472;}
  .panel{background:var(--white);border:1px solid var(--border);border-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:14px;}
  .panel-head{display:flex;align-items:center;gap:8px;background:#e9f1fa;border-bottom:1px solid #c9dcf1;padding:9px 14px;border-radius:4px 4px 0 0;}
  .panel-head .caret{cursor:pointer;color:#3f5670;font-size:12px;line-height:1;user-select:none;transition:transform .2s;display:inline-block;}
  .panel-head.collapsed .caret{transform:rotate(-90deg);}
  .panel-head .title-input{font-weight:700;font-size:13px;color:#2c3742;border:1px solid var(--blue);background:#fff;font-family:inherit;padding:2px 6px;border-radius:3px;min-width:220px;}
  .panel-head .title-input:hover{border-color:var(--blue-dark);}
  .panel-head .title-input:focus{border-color:var(--blue-dark);background:#fff;outline:none;box-shadow:0 0 0 2px rgba(47,137,238,.16);}
  .panel-head .actions{margin-left:auto;display:flex;gap:6px;}
  .search-body{padding:0;overflow:hidden;transition:max-height .25s ease;}
  table.search{width:100%;border-collapse:collapse;table-layout:fixed;}
  table.search th,table.search td{border:1px solid var(--border-soft);padding:0;height:38px;vertical-align:middle;}
  table.search th{background:var(--label-bg);color:#495260;font-weight:600;text-align:left;padding:0 14px;width:130px;font-size:12px;}
  table.search td{padding:5px 10px;background:#fff;}
  table.search colgroup col.c-lbl{width:130px;}
  table.search td.has-ctrl{position:relative;}
  .empty-cond{text-align:center;color:#9aa2ac;height:60px;background:#fafbfc;}
  .fld-row{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;}
  .ext-row.ext-hidden{display:none;}
  .ext-badge{display:inline-block;margin-left:6px;font-size:10px;color:#fff;background:#f0a020;border-radius:8px;padding:1px 6px;font-weight:700;vertical-align:middle;}
  .req-star{color:var(--danger);font-weight:800;margin-left:3px;}
  input.txt,select.cmb{height:28px;border:1px solid var(--border);border-radius:3px;padding:0 8px;font-family:inherit;font-size:12px;color:var(--text);background:#fff;width:100%;outline:none;}
  input.txt:focus,select.cmb:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(47,137,238,.12);}
  input.txt[readonly]{background:#fff;cursor:pointer;}
  select.cmb{appearance:none;-webkit-appearance:none;background:#fff;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:24px;cursor:pointer;}
  .grow{flex:1;min-width:0;}
  .date-wrap,.month-wrap{position:relative;width:150px;}
  .date-wrap input,.month-wrap input{padding-right:26px;cursor:pointer;}
  .pick-btn{position:absolute;right:1px;top:1px;bottom:1px;width:24px;border:none;background:transparent;cursor:pointer;color:#5b6470;display:flex;align-items:center;justify-content:center;}
  .tilde{color:#8b939d;padding:0 2px;}
  .num-in{width:120px;text-align:right;font-feature-settings:"tnum";}
  .select-box{height:28px;border:1px solid var(--border);border-radius:3px;background:#fff;display:flex;align-items:center;padding:0 8px;font-size:12px;cursor:pointer;flex:1;min-width:0;color:var(--text);}
  .select-box.empty{color:#9aa2ac;}
  .select-box:hover{border-color:var(--blue);}
  .select-box .val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lbl-input{width:100%;height:26px;border:1px dashed #c1cddd;border-radius:3px;padding:0 6px;font-family:inherit;font-size:12px;background:#fff;color:#2c3742;font-weight:600;outline:none;}
  .lbl-input:focus{border-color:var(--blue);border-style:solid;}
  .opt-row{display:flex;flex-wrap:wrap;align-items:center;gap:6px 16px;padding:2px 0;}
  .opt{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#48515c;cursor:pointer;user-select:none;}
  .opt input{margin:0;}
  .cell-ctrl{position:absolute;top:3px;right:4px;display:flex;gap:2px;z-index:3;}
  .cell-ctrl button{width:20px;height:20px;border:1px solid var(--border);background:#fff;border-radius:3px;cursor:pointer;font-size:11px;line-height:1;color:#5a6472;padding:0;display:flex;align-items:center;justify-content:center;}
  .cell-ctrl button:hover{background:#eef4fb;}
  .cell-ctrl button.on{background:#f0a020;color:#fff;border-color:#dc8f14;}
  .cell-ctrl button.req.on{background:var(--danger);border-color:#c9463f;}
  .cell-ctrl button.del:hover{background:#fdecec;color:#d0433c;border-color:#f0b4b1;}
  .excel-bar{display:flex;align-items:center;gap:6px;padding:10px 2px;}
  .excel-bar .count{margin-right:auto;font-size:12px;color:#5a6472;font-weight:600;}
  .excel-bar .count b{color:var(--blue-dark);font-feature-settings:"tnum";}
  /* ===== 버튼 톤(색) 공통 : 조회영역 / 엑셀영역 / 패널 버튼에 모두 적용 ===== */
  .btn.tone-blue,.gp-btn.tone-blue{background:var(--blue);border:1px solid var(--blue-dark);color:#fff;}
  .btn.tone-blue:hover,.gp-btn.tone-blue:hover{background:var(--blue-dark);border-color:var(--blue-dark);color:#fff;}
  .btn.tone-soft,.gp-btn.tone-soft{background:var(--soft-bg);border:1px solid var(--soft-bd);color:var(--soft-tx);}
  .btn.tone-soft:hover,.gp-btn.tone-soft:hover{background:var(--soft-bg-h);border-color:var(--soft-bd-h);color:var(--soft-tx);}
  .btn.tone-gray,.gp-btn.tone-gray{background:var(--gray-bg);border:1px solid var(--gray-bd);color:var(--gray-tx);}
  .btn.tone-gray:hover,.gp-btn.tone-gray:hover{background:var(--gray-bg-h);border-color:var(--gray-bd-h);color:var(--gray-tx);}
  .btn.tone-white,.gp-btn.tone-white{background:#fff;border:1px solid var(--border);color:#42505f;}
  .btn.tone-white:hover,.gp-btn.tone-white:hover{background:#f4f6f9;border-color:#c2ccd9;color:#42505f;}
  .btn.tone-blue .pbtn-x,.gp-btn.tone-blue .pbtn-x{color:#ffd9d6;}
  /* ===== 추가 버튼 톤 ===== */
  .btn.tone-red,.gp-btn.tone-red{background:#e0554e;border:1px solid #c9463f;color:#ffffff;}
  .btn.tone-red:hover,.gp-btn.tone-red:hover{background:#cf4740;border-color:#b83c36;color:#ffffff;}
  .btn.tone-softred,.gp-btn.tone-softred{background:#fdecec;border:1px solid #f0b4b1;color:#c0403a;}
  .btn.tone-softred:hover,.gp-btn.tone-softred:hover{background:#fbdedd;border-color:#e59b97;color:#c0403a;}
  .btn.tone-green,.gp-btn.tone-green{background:#1f9d55;border:1px solid #17854a;color:#ffffff;}
  .btn.tone-green:hover,.gp-btn.tone-green:hover{background:#17854a;border-color:#12703d;color:#ffffff;}
  .btn.tone-softgreen,.gp-btn.tone-softgreen{background:#e8f7ee;border:1px solid #a8d8bd;color:#1f7a4a;}
  .btn.tone-softgreen:hover,.gp-btn.tone-softgreen:hover{background:#d8f0e2;border-color:#87c8a3;color:#1f7a4a;}
  .btn.tone-orange,.gp-btn.tone-orange{background:#f0a020;border:1px solid #dc8f14;color:#ffffff;}
  .btn.tone-orange:hover,.gp-btn.tone-orange:hover{background:#dc8f14;border-color:#c47c0d;color:#ffffff;}
  .btn.tone-softorange,.gp-btn.tone-softorange{background:#fff5e3;border:1px solid #f0cf9a;color:#a86a12;}
  .btn.tone-softorange:hover,.gp-btn.tone-softorange:hover{background:#ffedd0;border-color:#e5bb78;color:#a86a12;}
  .btn.tone-teal,.gp-btn.tone-teal{background:#148f8c;border:1px solid #0f7a77;color:#ffffff;}
  .btn.tone-teal:hover,.gp-btn.tone-teal:hover{background:#0f7a77;border-color:#0b6462;color:#ffffff;}
  .btn.tone-purple,.gp-btn.tone-purple{background:#7a5cd0;border:1px solid #6a4cc0;color:#ffffff;}
  .btn.tone-purple:hover,.gp-btn.tone-purple:hover{background:#6a4cc0;border-color:#5a3fa8;color:#ffffff;}
  .btn.tone-navy,.gp-btn.tone-navy{background:#2c4a7c;border:1px solid #233d68;color:#ffffff;}
  .btn.tone-navy:hover,.gp-btn.tone-navy:hover{background:#233d68;border-color:#1a3054;color:#ffffff;}
  .btn.tone-dark,.gp-btn.tone-dark{background:#3a4551;border:1px solid #2c3742;color:#ffffff;}
  .btn.tone-dark:hover,.gp-btn.tone-dark:hover{background:#2c3742;border-color:#202932;color:#ffffff;}
  .btn.tone-red .pbtn-x,.gp-btn.tone-red .pbtn-x,.btn.tone-green .pbtn-x,.gp-btn.tone-green .pbtn-x,.btn.tone-orange .pbtn-x,.gp-btn.tone-orange .pbtn-x,.btn.tone-teal .pbtn-x,.gp-btn.tone-teal .pbtn-x,.btn.tone-purple .pbtn-x,.gp-btn.tone-purple .pbtn-x,.btn.tone-navy .pbtn-x,.gp-btn.tone-navy .pbtn-x,.btn.tone-dark .pbtn-x,.gp-btn.tone-dark .pbtn-x{color:#ffe0dd;}
  /* 선택취소 버튼 : 연파랑 톤 (333.jpg 기준) */
  .btn.btn-selcancel{background:var(--soft-bg);border:1px solid var(--soft-bd);color:var(--soft-tx);border-radius:3px;font-weight:600;}
  .btn.btn-selcancel:hover{background:var(--soft-bg-h);border-color:var(--soft-bd-h);color:var(--soft-tx);}
  /* 톤 미리보기 셀렉트 */
  .b-sel.tone-sel{width:112px;}
  .tabbar{display:flex;gap:3px;border-bottom:2px solid var(--blue);margin-bottom:14px;}
  .tab{padding:8px 18px;font-size:12.5px;font-weight:700;color:#5a6472;background:#eef2f7;border:1px solid var(--border);border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;}
  .tab.active{background:#fff;color:var(--blue-dark);border-color:var(--blue);position:relative;top:1px;}
  .toolbar-strip{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#eef4fb;border:1px solid #c9dcf1;border-radius:6px;padding:9px 12px;margin-bottom:14px;}
  .toolbar-strip .tsl{font-weight:700;color:#3a4551;font-size:12px;}
  .toolbar-strip select{height:28px;border:1px solid var(--border);border-radius:4px;padding:0 24px 0 8px;font-family:inherit;font-size:12px;background:#fff;appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 8px center;}
  .toolbar-strip .tb{border:1px solid #bcd6f4;background:#fff;color:#2f6bc0;border-radius:4px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .toolbar-strip .tb:hover{background:#eaf3fe;}
  .result-area{display:flex;gap:14px;align-items:flex-start;}
  .res-col{display:flex;flex-direction:column;gap:16px;min-width:0;}
  .gpanel{min-width:0;}
  .gp-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;min-height:26px;}
  .gp-head .gp-title{font-weight:700;font-size:14px;color:#2c3742;}
  .gp-head .gp-title-input{font-weight:700;font-size:14px;color:#2c3742;border:1px dashed transparent;background:transparent;font-family:inherit;padding:2px 4px;border-radius:3px;min-width:100px;max-width:280px;}
  .gp-head .gp-title-input:hover,.gp-head .gp-title-input:focus{border-color:#b7cbe6;background:#fff;outline:none;}
  .gp-head .gp-btns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .gp-btn{position:relative;border:1px solid #bcd6f4;background:#f4f9ff;color:#2f6bc0;border-radius:4px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .gp-btn:hover{background:#e7f1fd;}
  .gp-btn.primary{background:var(--blue);border-color:var(--blue-dark);color:#fff;}
  .gp-btn .pbtn-x{margin-left:5px;color:#c0403a;cursor:pointer;font-weight:800;}
  body.preview .gp-btn .pbtn-x{display:none;}
  .btn .pbtn-x{margin-left:5px;color:#c0403a;cursor:pointer;font-weight:800;}
  .btn.btn-primary .pbtn-x{color:#ffd9d6;}
  body.preview .btn .pbtn-x{display:none;}
  .excel-bar .xls-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .grid-outer{background:#fff;border:1px solid var(--border);border-radius:4px;overflow:hidden;width:max-content;max-width:100%;}
  .grid-scroll{overflow-x:auto;overflow-y:auto;max-height:480px;}
  table.grid{border-collapse:collapse;font-size:12px;white-space:nowrap;}
  body.preview table.grid{table-layout:fixed;}
  table.grid thead th{position:sticky;top:0;z-index:2;background:var(--grid-head);color:var(--grid-head-tx);font-weight:700;border:1px solid var(--grid-line);border-top:none;padding:0;text-align:center;height:36px;}
  table.grid thead th.grp{background:var(--grid-grp);}
  table.grid thead th.grp2{top:37px;}
  table.grid thead th .col-hd{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 8px;position:relative;}
  body.preview table.grid thead th{overflow:hidden;}
  body.preview table.grid thead th .col-hd{overflow:hidden;}
  body.preview table.grid tbody td{overflow:hidden;text-overflow:ellipsis;}
  table.grid thead th .col-hd.sortable>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
  table.grid thead th .col-hd.sortable{cursor:pointer;}
  table.grid thead th .col-hd.sortable:hover{color:#000;}
  table.grid thead th .sort-ar{font-size:9px;color:#8a8a8a;}
  table.grid thead th .col-input{width:100%;min-width:60px;height:24px;border:1px dashed #bdbdbd;border-radius:3px;padding:0 4px;font-family:inherit;font-size:12px;text-align:center;background:#fff;font-weight:700;color:var(--grid-head-tx);outline:none;}
  table.grid thead th .col-input:focus{border-color:var(--blue);border-style:solid;}
  table.grid thead th .grp-input{width:100%;min-width:70px;height:22px;border:1px dashed #b5b5b5;border-radius:3px;padding:0 4px;font-family:inherit;font-size:12px;text-align:center;background:#f0f0f0;font-weight:700;color:#2f2f2f;outline:none;}
  table.grid thead th .grp-input:focus{border-color:var(--blue);border-style:solid;background:#fff;}
  table.grid thead th.chkcol,table.grid td.chkcol{width:32px;padding:0;text-align:center;}
  table.grid tbody td{border:1px solid #e6e9ee;padding:6px 8px;color:#3d4550;text-align:center;height:31px;}
  table.grid tbody td.l{text-align:left;}
  table.grid tbody td.r{text-align:right;font-feature-settings:"tnum";}
  table.grid tbody tr:nth-child(even) td{background:#fafbfc;}
  table.grid tbody tr:hover td{background:#eef5fd;}
  table.grid tbody tr.sel td{background:#dbeafe!important;}
  table.grid td.rownum{background:#f2f4f7;color:#6b7480;font-weight:600;width:40px;position:relative;}
  table.grid td.rownum .row-del{display:none;position:absolute;inset:0;margin:auto;width:18px;height:18px;border:1px solid #f0b4b1;background:#fff;color:#d0433c;border-radius:3px;cursor:pointer;font-size:11px;line-height:1;padding:0;}
  body.edit table.grid td.rownum:hover .row-del{display:flex;align-items:center;justify-content:center;}
  body.edit table.grid td.rownum:hover span{visibility:hidden;}
  table.grid tbody td .cell-input{width:100%;height:23px;border:1px solid transparent;border-radius:3px;padding:0 5px;font-family:inherit;font-size:12px;background:transparent;color:#3d4550;outline:none;text-align:inherit;}
  table.grid tbody td.l .cell-input{text-align:left;}
  table.grid tbody td.r .cell-input{text-align:right;font-feature-settings:"tnum";}
  table.grid tbody td .cell-input:hover{border-color:#dce3ec;}
  table.grid tbody td .cell-input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 2px rgba(47,137,238,.12);}
  table.grid tbody td .cell-sel{min-width:64px;height:23px;border:1px solid #d3dce8;border-radius:3px;background:#fff;font-size:11.5px;font-family:inherit;color:#3d4550;padding:0 18px 0 6px;appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5'><path d='M0 0l4 5 4-5z' fill='%236b7684'/></svg>");background-repeat:no-repeat;background-position:right 6px center;cursor:pointer;}
  table.grid tbody td .cell-link{color:var(--blue-dark);text-decoration:underline;cursor:pointer;font-weight:600;}
  table.grid tfoot td{position:sticky;bottom:0;z-index:2;background:#eef1f5;border:1px solid var(--grid-line);padding:6px 8px;font-weight:700;color:#2c3742;text-align:center;}
  table.grid tfoot td.r{text-align:right;font-feature-settings:"tnum";}
  .col-gear{width:36px;background:var(--grid-head);}
  .empty-grid{padding:44px 0;text-align:center;color:#9aa2ac;font-size:13px;}

      <select class="b-sel tone-sel" id="xlsBtnTone" title="버튼 색"><optgroup label="진한 색"><option value="blue">파랑</option><option value="navy">남색</option><option value="teal">청록</option><option value="green">초록</option><option value="orange">주황</option><option value="red">빨강</option><option value="purple">보라</option><option value="dark">검정</option></optgroup><optgroup label="연한 색"><option value="soft" selected>연파랑</option><option value="softgreen">연초록</option><option value="softorange">연주황</option><option value="softred">연빨강</option><option value="gray">회색</option><option value="white">흰색</option></optgroup></select>

<div class="cal" id="calPop">
  <div class="cal-hd"><button class="nav" id="calPrev">‹</button><span class="ym" id="calYm"></span><button class="nav" id="calNext">›</button></div>
  <table><thead><tr><th style="color:#d9534f">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th style="color:#3a6fb0">토</th></tr></thead><tbody id="calBody"></tbody></table>

  <div class="cal-hd"><button class="nav" id="monthPrev">‹</button><span class="ym" id="monthYr"></span><button class="nav" id="monthNext">›</button></div>
  <div class="month-grid" id="monthGrid"></div>
  <div class="cal-ft" style="justify-content:flex-end;"><button id="monthClose">닫기</button></div>
</div>

<script>
/* ================= 상태 ================= */
let seq = 1;
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return fmt(new Date());}
function monthNowStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
const CAL_ICON = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="12" rx="1.5" stroke="#5b6470"/><path d="M1.5 5.5h13M5 1v3M11 1v3" stroke="#5b6470"/></svg>';
const CARET_ICON = '<svg width="10" height="6" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z" fill="#6b7684"/></svg>';

function newPanel(title,colIndex){
  return {id:'P'+(seq++), title:title||'조회결과', colIndex:colIndex||0, buttons:[],
    check:false, rownum:true, gear:true, showSum:false, pager:false, selRow:-1,
    columns:[], rows:[], sort:{kid:null,dir:1}};
}
const defSearchBtns = () => [{label:'확장조회',primary:true,tone:'blue'},{label:'조회',primary:true,tone:'blue'}];
const defExcelBtns  = () => [{label:'현재화면 엑셀다운로드',primary:false,tone:'soft'},{label:'조회조건 엑셀다운로드',primary:false,tone:'soft'},{label:'분할 엑셀다운로드',primary:false,tone:'soft'}];
/* 버튼 톤 결정 : 저장된 tone > 강조(primary) > 라벨에 '엑셀' 포함 시 연파랑 > 흰색 */
const TONES = [['blue','파랑'],['soft','연파랑'],['gray','회색'],['white','흰색']];
const btnTone = (b,def) => b.tone || (b.primary ? 'blue' : (/엑셀/.test(b.label||'') ? 'soft' : (def||'white')));
const state = {
  title:'화면 제목을 입력하세요', desc:'', extShown:false, queried:true,
  conditions:[], popups:[], infoPopups:[],
  searchBtns: defSearchBtns(), excelBtns: defExcelBtns(),
  tabs:[], activeTab:0, toolbar:null, searchOn:true,
  cols:[{flex:1}], panels:[newPanel('조회결과',0)], curPanel:null
};
state.curPanel = state.panels[0].id;

const isEdit  = () => !document.body.classList.contains('preview');
const findCond= id => state.conditions.find(c=>c.id===id);
const findPopup=id => state.popups.find(p=>p.id===id);
const findP   = id => state.panels.find(p=>p.id===id);
const curP    = () => state.panels.find(p=>p.id===state.curPanel) || state.panels[0];
const NUMERIC = k => k.cellType==='number' || k.align==='r' || ['comma','won','percent'].includes(k.format);
const truthy  = v => v===true||['1','y','Y','true','O','o','사용','체크','예'].includes(String(v));

/* ================= 조회조건 추가 ================= */
document.querySelectorAll('[data-add]').forEach(b=>{ b.onclick=()=>addCondition(b.dataset.add); });
function addCondition(type){
  const name=$('condName').value.trim();
  if(type!=='blank' && !name){ alert('조회조건명을 입력하세요.'); $('condName').focus(); return; }
  state.conditions.push({id:'c'+(seq++),type,label:type==='blank'?'':name,range:$('condRange').checked,ext:$('condExt').checked,required:$('condReq').checked,options:[]});
  render();
}
document.querySelectorAll('[data-selkind]').forEach(b=>{
  b.onclick=()=>{
    const name=$('comboName').value.trim();
    const opts=$('comboOpts').value.split(',').map(s=>s.trim()).filter(Boolean);
    if(!name){ alert('조건명을 입력하세요.'); $('comboName').focus(); return; }
    if(!opts.length){ alert('옵션을 입력하세요.'); $('comboOpts').focus(); return; }
    state.conditions.push({id:'c'+(seq++),type:b.dataset.selkind,label:name,range:false,ext:$('condExt').checked,required:$('condReq').checked,options:opts});
    $('comboOpts').value=''; render();
  };
});

/* ================= 조건 필드 렌더 ================= */
function packRows(conds){
  const normal=conds.filter(c=>!c.ext), ext=conds.filter(c=>c.ext), rows=[];
  for(let i=0;i<normal.length;i+=2) rows.push({ext:false, cells:[normal[i], normal[i+1]||null]});
  for(let i=0;i<ext.length;i+=2)    rows.push({ext:true,  cells:[ext[i], ext[i+1]||null]});
  return rows;
}
function condFieldHTML(c){
  switch(c.type){
    case 'date':   return rangeWrap(c,'date');
    case 'month':  return rangeWrap(c,'month');
    case 'year':   return yearField(c);
    case 'quarter':return quarterField(c);
    case 'text':   return `<div class="fld-row"><input class="txt"></div>`;
    case 'number': return numberField(c);
    case 'combo':  return `<div class="fld-row"><select class="cmb">${c.options.map(o=>`<option>${esc(o)}</option>`).join('')}</select></div>`;
    case 'radio':  return optRow(c,'radio');
    case 'checkbox':return optRow(c,'checkbox');
    case 'cat':    return popupField(c,'cat','분류조회 선택');
    case 'store':  return popupField(c,'store','전체');
    case 'prod':   return popupField(c,'prod','전체');
    case 'custompopup': return customPopupField(c);
    case 'blank':  return '';
  }
  return '';
}
function rangeWrap(c,kind){
  const cls=kind==='date'?'date-wrap':'month-wrap', jcls=kind==='date'?'js-date':'js-month', jbtn=kind==='date'?'js-date-btn':'js-month-btn';
  const val=kind==='date'?todayStr():monthNowStr(), icon=kind==='date'?CAL_ICON:CARET_ICON;
  const one=`<div class="${cls}"><input class="txt ${jcls}" readonly value="${val}"><button class="pick-btn ${jbtn}" type="button">${icon}</button></div>`;
  return `<div class="fld-row">${one}${c.range?`<span class="tilde">~</span>${one}`:''}</div>`;
}
function yearField(c){const y=new Date().getFullYear();let o='';for(let i=y+1;i>=y-6;i--)o+=`<option ${i===y?'selected':''}>${i}년</option>`;const one=`<select class="cmb" style="width:120px">${o}</select>`;return `<div class="fld-row">${one}${c.range?`<span class="tilde">~</span>${one}`:''}</div>`;}
function quarterField(c){const one=`<select class="cmb" style="width:110px"><option>1분기</option><option>2분기</option><option>3분기</option><option>4분기</option></select>`;return `<div class="fld-row">${one}${c.range?`<span class="tilde">~</span>${one}`:''}</div>`;}
function numberField(c){const one=`<input class="txt num-in" type="text" inputmode="numeric" placeholder="0">`;return `<div class="fld-row">${one}${c.range?`<span class="tilde">~</span>${one}`:''}</div>`;}
function optRow(c,kind){const nm=kind==='radio'?`name="${c.id}"`:'';return `<div class="opt-row">${c.options.map((o,i)=>`<label class="opt"><input type="${kind}" ${nm} ${kind==='radio'&&i===0?'checked':''}>${esc(o)}</label>`).join('')}</div>`;}
function popupField(c,type,ph){return `<div class="fld-row"><div class="select-box grow empty" id="${c.id}_box" data-popup="${type}"><span class="val">${ph}</span></div><button class="btn btn-sm btn-selcancel" data-clear="${c.id}_box">선택취소</button></div>`;}
function customPopupField(c){const p=findPopup(c.popupId);const ph=p?'전체':'(삭제된 팝업)';return `<div class="fld-row"><div class="select-box grow empty" id="${c.id}_box" data-popup="custom" data-pid="${c.popupId}"><span class="val">${ph}</span></div><button class="btn btn-sm btn-selcancel" data-clear="${c.id}_box">선택취소</button></div>`;}
function condCtrl(c){return `<div class="cell-ctrl"><button data-act="up" data-cid="${c.id}">▲</button><button data-act="down" data-cid="${c.id}">▼</button><button data-act="req" data-cid="${c.id}" class="req ${c.required?'on':''}">*</button><button data-act="ext" data-cid="${c.id}" class="${c.ext?'on':''}">확</button><button data-act="del" data-cid="${c.id}" class="del">✕</button></div>`;}
function condCell(c){
  if(!c) return `<th></th><td></td>`;
  const star=c.required?'<span class="req-star">*</span>':'';
  const th=isEdit()?`<th><input class="lbl-input" data-cid="${c.id}" value="${esc(c.label)}" placeholder="${c.type==='blank'?'(빈칸)':'조건명'}">${star}</th>`
                   :`<th>${esc(c.label)}${star}${c.ext?'<span class="ext-badge">확장</span>':''}</th>`;
  const td=`<td class="has-ctrl">${condFieldHTML(c)}${isEdit()?condCtrl(c):''}</td>`;
  return th+td;
}
function renderConditions(){
  const body=$('condBody');
  if(!state.conditions.length){ body.innerHTML=`<tr><td class="empty-cond" colspan="4">상단 버튼으로 조회조건을 추가하세요.</td></tr>`; return; }
  body.innerHTML=packRows(state.conditions).map(row=>`<tr class="${row.ext?'ext-row':''}">${condCell(row.cells[0])}${condCell(row.cells[1])}</tr>`).join('');
  applyExt();
}
const hasExtBtn = () => (state.searchBtns||[]).some(b=>/확장/.test(b.label));
function applyExt(){ const hide=!isEdit()&&hasExtBtn()&&!state.extShown; document.querySelectorAll('#condBody .ext-row').forEach(r=>r.classList.toggle('ext-hidden',hide)); }

/* ================= 조회영역 / 엑셀영역 버튼 렌더 ================= */
function renderSearchBtns(){
  const box=$('searchActions'); if(!box) return; const edit=isEdit();
  box.innerHTML=(state.searchBtns||[]).map((b,i)=>
    `<button class="btn tone-${btnTone(b)}" data-sbtn="${i}">${esc(b.label)}${edit?`<span class="pbtn-x" data-sbtnx="${i}">×</span>`:''}</button>`).join('');
}
function renderExcelBtns(){
  const box=$('excelActions'); if(!box) return; const edit=isEdit();
  box.innerHTML=(state.excelBtns||[]).map((b,i)=>
    `<button class="btn tone-${btnTone(b)}" data-xbtn="${i}">${esc(b.label)}${edit?`<span class="pbtn-x" data-xbtnx="${i}">×</span>`:''}</button>`).join('');
}

/* ================= 포맷/합계/정렬 ================= */
function fmtCell(val,k){
  if(val==null||val==='') return '';
  const num=Number(String(val).replace(/,/g,''));
  switch(k.format){
    case 'comma':   return isNaN(num)?esc(val):num.toLocaleString('ko-KR');
    case 'won':     return isNaN(num)?esc(val):'₩'+num.toLocaleString('ko-KR');
    case 'percent': return isNaN(num)?esc(val):num.toLocaleString('ko-KR')+'%';
    default:        return esc(String(val));
  }
}
function sumColP(p,k){let s=0,has=false;p.rows.forEach(r=>{const v=r[k.id];if(v!=null&&v!==''){const n=Number(String(v).replace(/,/g,''));if(!isNaN(n)){s+=n;has=true;}}});return has?s:null;}
function headerRunsP(p){const runs=[],cols=p.columns;let i=0;while(i<cols.length){const g=cols[i].group||'';if(!g){runs.push({group:'',cols:[cols[i]]});i++;}else{let j=i;const run=[];while(j<cols.length&&(cols[j].group||'')===g){run.push(cols[j]);j++;}runs.push({group:g,cols:run});i=j;}}return runs;}
function displayRowsP(p){
  if(isEdit()||!p.sort.kid) return p.rows.map((r,i)=>({r,i}));
  const k=p.columns.find(c=>c.id===p.sort.kid); if(!k) return p.rows.map((r,i)=>({r,i}));
  const arr=p.rows.map((r,i)=>({r,i})), numeric=NUMERIC(k);
  arr.sort((a,b)=>{let x=a.r[k.id]??'',y=b.r[k.id]??'';if(numeric){x=Number(String(x).replace(/,/g,''))||0;y=Number(String(y).replace(/,/g,''))||0;return (x-y)*p.sort.dir;}return String(x).localeCompare(String(y),'ko')*p.sort.dir;});
  return arr;
}

/* ================= 패널 그리드 렌더 ================= */
function colCtrlP(p,k){return `<div class="cell-ctrl" style="position:static;margin-left:2px;"><button data-act="cleft" data-pid="${p.id}" data-kid="${k.id}">◀</button><button data-act="cright" data-pid="${p.id}" data-kid="${k.id}">▶</button><button data-act="cdel" data-pid="${p.id}" data-kid="${k.id}" class="del">✕</button></div>`;}
function colHeadCellP(p,k,edit){
  if(edit) return `<div class="col-hd"><input class="col-input" data-pid="${p.id}" data-kid="${k.id}" value="${esc(k.name)}">${colCtrlP(p,k)}</div>`;
  const ar=p.sort.kid===k.id?(p.sort.dir>0?'▲':'▼'):'↕';
  return `<div class="col-hd sortable" data-pid="${p.id}" data-sort="${k.id}"><span>${esc(k.name)}</span><span class="sort-ar">${ar}</span></div>`;
}
function tdcls(k){return k.cellType==='number'||k.align==='r'?'r':k.align==='l'?'l':'';}
function selHtml(p,k,raw,ri){const opts=(k.options&&k.options.length?k.options.slice():[String(raw||'')]);if(raw&&!opts.includes(String(raw)))opts.unshift(String(raw));return `<select class="cell-sel" data-pid="${p.id}" data-ri="${ri}" data-kid="${k.id}">${opts.map(o=>`<option ${String(o)===String(raw)?'selected':''}>${esc(o)}</option>`).join('')}</select>`;}
function cellRender(p,k,row,ri,edit){
  const raw=row[k.id]??'';
  if(k.cellType==='checkbox') return `<input type="checkbox" class="cell-chk" data-pid="${p.id}" data-ri="${ri}" data-kid="${k.id}" ${truthy(raw)?'checked':''}>`;
  if(k.cellType==='dropdown') return selHtml(p,k,raw,ri);
  if(edit) return `<input class="cell-input" data-pid="${p.id}" data-ri="${ri}" data-kid="${k.id}" value="${esc(String(raw))}">`;
  if(k.cellType==='link') return raw!==''?`<a class="cell-link" data-infopopup="${k.infoPopupId||''}"${k.infoPopupId?' title="클릭 시 정보 팝업"':''}>${esc(String(raw))}</a>`:'&nbsp;';
  return fmtCell(raw,k)||'&nbsp;';
}
function renderPanelGrid(p){
  if(!p.columns.length) return `<div class="empty-grid">‘컬럼 추가’로 이 패널의 컬럼을 만들어 주세요.</div>`;
  const edit=isEdit(), runs=headerRunsP(p), hasGrp=runs.some(r=>r.group);
  const lead=(p.rownum?1:0)+(p.check?1:0);
  let cg='<colgroup>', leadPx=0, sumCh=0;
  if(p.rownum){ cg+='<col style="width:40px">'; leadPx+=40; }
  if(p.check){  cg+='<col style="width:32px">'; leadPx+=32; }
  p.columns.forEach(k=>{const w=k.width||20; sumCh+=w; cg+=`<col style="width:${w}ch">`;});
  cg+='</colgroup>';
  const tw=`calc(${leadPx}px + ${sumCh}ch)`;
  let h='<div class="grid-scroll"><table class="grid" style="width:'+tw+'">'+cg+'<thead><tr>';
  if(p.rownum) h+=`<th class="col-gear" ${hasGrp?'rowspan="2"':''}>${edit?'⚙':'No'}</th>`;
  if(p.check)  h+=`<th class="chkcol" ${hasGrp?'rowspan="2"':''}><input type="checkbox" class="chk-all" data-pid="${p.id}"></th>`;
  runs.forEach(run=>{
    if(run.group){const ids=run.cols.map(c=>c.id).join(',');const inner=edit?`<input class="grp-input" data-pid="${p.id}" data-run="${ids}" value="${esc(run.group)}">`:`<span>${esc(run.group)}</span>`;h+=`<th class="grp" colspan="${run.cols.length}"><div class="col-hd">${inner}</div></th>`;}
    else{h+=`<th ${hasGrp?'rowspan="2"':''}>${colHeadCellP(p,run.cols[0],edit)}</th>`;}
  });
  h+='</tr>';
  if(hasGrp){h+='<tr>';runs.forEach(run=>{if(run.group)run.cols.forEach(k=>h+=`<th class="grp2">${colHeadCellP(p,k,edit)}</th>`);});h+='</tr>';}
  h+='</thead><tbody>';
  const total=lead+p.columns.length, rows=displayRowsP(p);
  if(!state.queried){ h+=`<tr><td colspan="${total}" style="color:#9aa2ac;padding:26px;">조회 버튼을 눌러 조회하세요.</td></tr>`; }
  else if(!rows.length){ h+=`<tr><td colspan="${total}" style="color:#9aa2ac;padding:26px;">데이터가 없습니다. ‘＋ 행’·‘🎲 샘플’로 채워보세요.</td></tr>`; }
  else rows.forEach((it,vi)=>{
    h+=`<tr class="${p.selRow===it.i?'sel':''}">`;
    if(p.rownum) h+=`<td class="rownum"><span>${vi+1}</span>${edit?`<button class="row-del" data-rpid="${p.id}" data-rdel="${it.i}">✕</button>`:''}</td>`;
    if(p.check)  h+=`<td class="chkcol"><input type="checkbox" class="chk-row"></td>`;
    p.columns.forEach(k=>{ h+=`<td class="${tdcls(k)}">${cellRender(p,k,it.r,it.i,edit)}</td>`; });
    h+='</tr>';
  });
  h+='</tbody>';
  if(p.showSum){
    h+='<tfoot><tr>';
    h+=`<td colspan="${lead||1}">합계</td>`;
    const dataCols = lead>0? p.columns : p.columns.slice(1);
    dataCols.forEach(k=>{const s=NUMERIC(k)?sumColP(p,k):null;h+=`<td class="${tdcls(k)}">${s==null?'&nbsp;':fmtCell(s,k)}</td>`;});
    h+='</tr></tfoot>';
  }
  h+='</table></div>';
  return h;
}
function renderPager(){ return `<div class="pager"><button>«</button><button class="on">1</button><button>2</button><button>3</button><button>»</button></div>`; }
function renderPanel(p){
  const edit=isEdit(); let head='';

  const sortHit=e.target.closest('[data-sort]');
  if(sortHit&&!isEdit()){const p=findP(sortHit.dataset.pid);const kid=sortHit.dataset.sort;if(p.sort.kid===kid)p.sort.dir*=-1;else{p.sort.kid=kid;p.sort.dir=1;}renderResult();return;}
  const act=e.target.closest('[data-act]'); if(!act) return;
  const a=act.dataset.act, cid=act.dataset.cid, kid=act.dataset.kid, pid=act.dataset.pid;
  if(cid){
    const arr=state.conditions,i=arr.findIndex(c=>c.id===cid);
    if(a==='up'&&i>0){[arr[i-1],arr[i]]=[arr[i],arr[i-1]];}
    else if(a==='down'&&i<arr.length-1){[arr[i+1],arr[i]]=[arr[i],arr[i+1]];}
    else if(a==='del'){arr.splice(i,1);}
    else if(a==='ext'){arr[i].ext=!arr[i].ext;}
    else if(a==='req'){arr[i].required=!arr[i].required;}
    render();
  }else if(pid&&kid){
    const p=findP(pid),arr=p.columns,i=arr.findIndex(k=>k.id===kid);
    if(a==='cleft'&&i>0){[arr[i-1],arr[i]]=[arr[i],arr[i-1]];}
    else if(a==='cright'&&i<arr.length-1){[arr[i+1],arr[i]]=[arr[i],arr[i+1]];}
    else if(a==='cdel'){const rm=arr.splice(i,1)[0];p.rows.forEach(r=>delete r[rm.id]);}
    renderResult();
  }
});

function genRows(p,n){
  const stores=[['E09725','학동역점'],['E09748','맘스터치 A점'],['C00001','남양주오남'],['C00023','피자앤치킨']];
  const prods=['쉬림프골드','포테이토골드','스페셜콰트로','트리플 올인원'];
  const out=[];
  for(let r=0;r<n;r++){const row={};p.columns.forEach(k=>{const nm=k.name;
    if(k.cellType==='checkbox') row[k.id]=Math.random()>.5?'1':'';
    else if(k.cellType==='dropdown') row[k.id]=(k.options&&k.options[0])||'선택';
    else if(NUMERIC(k)) row[k.id]= k.format==='percent'?(Math.random()*100).toFixed(1):String(Math.floor(Math.random()*90000)+1000);
    else if(/일자|날짜/.test(nm)){const d=new Date();d.setDate(d.getDate()-r);row[k.id]=fmt(d);}
    else if(/매장명|점포|그룹명/.test(nm)) row[k.id]=stores[r%stores.length][1];
    else if(/매장코드|그룹코드|코드/.test(nm)) row[k.id]=stores[r%stores.length][0];
    else if(/상품명|메뉴/.test(nm)) row[k.id]=prods[r%prods.length];
    else row[k.id]=nm+' '+(r+1);});out.push(row);}
  return out;
}

function doExcel(){
  const p=curP(); if(!p||!p.columns.length){alert('현재 패널에 컬럼이 없습니다.');return;}
  const runs=headerRunsP(p),hasGrp=runs.some(r=>r.group);const aoa=[],merges=[];
  if(hasGrp){const h1=['No'],h2=[''];let col=1;runs.forEach(run=>{if(run.group){h1.push(run.group);for(let i=1;i<run.cols.length;i++)h1.push('');run.cols.forEach(k=>h2.push(k.name));merges.push({s:{r:0,c:col},e:{r:0,c:col+run.cols.length-1}});col+=run.cols.length;}else{h1.push(run.cols[0].name);h2.push('');merges.push({s:{r:0,c:col},e:{r:1,c:col}});col++;}});merges.push({s:{r:0,c:0},e:{r:1,c:0}});aoa.push(h1,h2);}
  else aoa.push(['No',...p.columns.map(k=>k.name)]);
  p.rows.forEach((r,i)=>aoa.push([i+1,...p.columns.map(k=>{const v=r[k.id]??'';const n=Number(String(v).replace(/,/g,''));return (v!==''&&!isNaN(n))?n:v;})]));
  if(p.showSum)aoa.push(['합계',...p.columns.map(k=>NUMERIC(k)&&sumColP(p,k)!=null?sumColP(p,k):'')]);
  const ws=XLSX.utils.aoa_to_sheet(aoa); if(merges.length)ws['!merges']=merges;
  ws['!cols']=[{wch:5},...p.columns.map(k=>({wch:Math.max(10,k.name.length*2)}))];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,(p.title||state.title||'화면').substring(0,28).replace(/[\\/?*:\[\]]/g,'_'));
  XLSX.writeFile(wb,(state.title||'조회화면')+'.xlsx');
}

/* ================= HTML 내보내기(완성 화면 스냅샷) ================= */
function cloneWithValues(sel){
  const orig=document.querySelector(sel); if(!orig) return '';
  const clone=orig.cloneNode(true);
  const oI=orig.querySelectorAll('input,select,textarea'), cI=clone.querySelectorAll('input,select,textarea');
  oI.forEach((el,i)=>{const c=cI[i];if(!c)return;
    if(el.tagName==='SELECT'){[...c.options].forEach((o,oi)=>{oi===el.selectedIndex?o.setAttribute('selected','selected'):o.removeAttribute('selected');});}
    else if(el.type==='checkbox'||el.type==='radio'){el.checked?c.setAttribute('checked','checked'):c.removeAttribute('checked');}
    else{c.setAttribute('value',el.value);if(el.tagName==='TEXTAREA')c.textContent=el.value;}});
  return clone.outerHTML;
}

/* ================= 달력 ================= */
const cal={pop:$('calPop'),body:$('calBody'),ym:$('calYm'),target:null,view:new Date()};
function parseDate(s){const p=(s||'').split('-');return p.length===3?new Date(+p[0],+p[1]-1,+p[2]):new Date();}
function drawCal(){
  const y=cal.view.getFullYear(),m=cal.view.getMonth();cal.ym.textContent=`${y}년 ${m+1}월`;
  const start=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  const today=todayStr(),sel=cal.target?cal.target.value:'';let cells=[];
  for(let i=start-1;i>=0;i--)cells.push({d:prev-i,mo:m-1,mute:true});
  for(let d=1;d<=days;d++)cells.push({d,mo:m});
  while(cells.length%7!==0)cells.push({d:cells.length-(start+days)+1,mo:m+1,mute:true});
  let html='';cells.forEach((c,i)=>{if(i%7===0)html+='<tr>';const ds=fmt(new Date(y,c.mo,c.d)),dow=i%7;let cls='';if(c.mute)cls+=' mute';else{if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';}if(ds===today)cls+=' today';if(ds===sel)cls+=' on';html+=`<td><button class="${cls.trim()}" data-date="${ds}">${c.d}</button></td>`;if(i%7===6)html+='</tr>';});
  cal.body.innerHTML=html;cal.body.querySelectorAll('button').forEach(b=>b.onclick=()=>{if(cal.target)cal.target.value=b.dataset.date;closeCal();});
}
function openCalFor(input){cal.target=input;cal.view=parseDate(input.value);const r=input.closest('.date-wrap').getBoundingClientRect();cal.pop.style.left=(window.scrollX+r.left)+'px';cal.pop.style.top=(window.scrollY+r.bottom+4)+'px';cal.pop.classList.add('open');drawCal();}
function closeCal(){cal.pop.classList.remove('open');}
$('calPrev').onclick=()=>{cal.view.setMonth(cal.view.getMonth()-1);drawCal();};
$('calNext').onclick=()=>{cal.view.setMonth(cal.view.getMonth()+1);drawCal();};
$('calToday').onclick=()=>{if(cal.target)cal.target.value=todayStr();closeCal();};
$('calClose').onclick=closeCal;
const mon={pop:$('monthPop'),grid:$('monthGrid'),yr:$('monthYr'),target:null,year:new Date().getFullYear()};
function parseMonth(s){const p=(s||'').split('-');return{y:+p[0],m:+p[1]};}
function drawMonth(){mon.yr.textContent=mon.year+'년';const cur=mon.target?parseMonth(mon.target.value):{};let html='';for(let m=1;m<=12;m++){const on=(cur.y===mon.year&&cur.m===m)?'on':'';html+=`<button class="${on}" data-m="${m}">${m}월</button>`;}mon.grid.innerHTML=html;mon.grid.querySelectorAll('button').forEach(b=>b.onclick=()=>{if(mon.target)mon.target.value=mon.year+'-'+String(+b.dataset.m).padStart(2,'0');closeMonth();});}
function openMonthFor(input){mon.target=input;const cur=parseMonth(input.value);mon.year=cur.y||new Date().getFullYear();const r=input.closest('.month-wrap').getBoundingClientRect();mon.pop.style.left=(window.scrollX+r.right-212)+'px';mon.pop.style.top=(window.scrollY+r.bottom+4)+'px';mon.pop.classList.add('open');drawMonth();}
function closeMonth(){mon.pop.classList.remove('open');}
$('monthPrev').onclick=()=>{mon.year--;drawMonth();};
$('monthNext').onclick=()=>{mon.year++;drawMonth();};
$('monthClose').onclick=closeMonth;

/* ================= 팝업 click 위임 ================= */
document.addEventListener('click', e=>{
  const dateHit=e.target.closest('.js-date, .js-date-btn');
  const monHit =e.target.closest('.js-month, .js-month-btn');
  const box    =e.target.closest('.select-box[data-popup]');
  const clr    =e.target.closest('[data-clear]');
  if(dateHit){openCalFor(dateHit.closest('.date-wrap').querySelector('.js-date'));closeMonth();e.stopPropagation();return;}
  if(monHit){openMonthFor(monHit.closest('.month-wrap').querySelector('.js-month'));closeCal();e.stopPropagation();return;}
  if(box){openPopup(box.dataset.popup,box.id,box.dataset.pid);return;}
  if(clr){clearBox(clr.dataset.clear);return;}
  if(!e.target.closest('#calPop'))closeCal();
  if(!e.target.closest('#monthPop'))closeMonth();
});

/* ================= 팝업(매장/상품/분류/커스텀) ================= */
const STORE_DATA=[['001060MP','미스터피자 야탑점','오픈',''],['001070MP','미스터피자 신흥점','오픈',''],['001130MP','미스터피자 산본점','오픈',''],['001190MP','미스터피자 부평점','오픈',''],['001200MP','미스터피자 중동점','오픈',''],['001290MP','미스터피자 상계점','오픈',''],['001340MP','미스터피자 잠실점','오픈',''],['001470MP','미스터피자 수지점','폐점',''],['C00023','피자앤치킨 서초점','오픈','제한']];
const PROD_DATA=[['0101000740','쉬림프골드'],['0101000760','포테이토골드'],['0101000770','하프앤하프'],['0101001070','새우천왕'],['0101001480','스페셜콰트로'],['0101001490','트리플 올인원'],['0101001500','멕시칸 치폴레']];
const CAT_TREE=[{name:'사이드',children:['감자류','소스','치킨류']},{name:'옵션',children:['옵션','토핑','사이즈']},{name:'피자',children:['프리미엄','스테디','신제품']}];
const mask=$('modalMask'),modalBox=$('modalBox');
function openModal(wide){mask.classList.add('open');modalBox.className='modal'+(wide?' wide':'');}
function closeModal(){mask.classList.remove('open');}
mask.addEventListener('click',e=>{if(e.target===mask)closeModal();});
function bindX(){modalBox.querySelectorAll('[data-x]').forEach(x=>x.onclick=closeModal);}
function setBoxValue(boxId,text){const b=$(boxId);if(!b)return;b.querySelector('.val').textContent=text;b.classList.toggle('empty',!text||text==='전체'||text==='분류조회 선택');}
function clearBox(boxId){const b=$(boxId);const ph=b&&b.dataset.popup==='cat'?'분류조회 선택':'전체';setBoxValue(boxId,ph);}
function openPopup(type,boxId,pid){
  if(type==='store')buildStore(boxId);else if(type==='prod')buildProd(boxId);else if(type==='cat')buildCat(boxId);
  else if(type==='custom'){const p=findPopup(pid);if(!p){alert('삭제된 팝업입니다.');return;}buildCustomModal(p,boxId);}
  openModal();
}
function buildStore(boxId){
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">매장선택</span><button class="x" data-x>&times;</button></div><div class="modal-body">
    <table class="m-search"><tr><td class="ml">매장코드</td><td><input id="fsc"></td><td class="ml">매장명</td><td><input id="fsn"></td></tr>
    <tr><td class="ml">매장상태</td><td><select><option>전체</option><option>오픈</option><option>폐점</option></select></td><td class="ml">매장</td><td><div style="display:flex;gap:6px;"><input id="fsk" style="flex:1"><button class="filter-btn" id="sf">필터</button></div></td></tr></table>
    <div class="m-btns"><button class="btn btn-sm" id="srl">조회</button><button class="btn btn-primary btn-sm" id="sap">선택</button></div>
    <div class="m-grid-wrap"><table class="m-grid"><thead><tr><th class="chk"><input type="checkbox" id="sall"></th><th>매장코드</th><th>매장명</th><th>상태</th></tr></thead><tbody id="sbody"></tbody></table></div></div>`;
  bindX();const body=modalBox.querySelector('#sbody');let cur=STORE_DATA.slice();
  const draw=l=>{body.innerHTML=l.map((r,i)=>`<tr><td class="chk"><input type="checkbox" class="sc" value="${i}"></td><td>${r[0]}</td><td>${r[1]}</td><td><span class="badge ${r[2]==='오픈'?'open':'close'}">${r[2]}</span></td></tr>`).join('');body.querySelectorAll('tr').forEach(tr=>tr.onclick=e=>{if(e.target.type!=='checkbox'){const c=tr.querySelector('.sc');c.checked=!c.checked;}});};
  draw(cur);
  modalBox.querySelector('#sall').onchange=e=>body.querySelectorAll('.sc').forEach(c=>c.checked=e.target.checked);
  const flt=()=>{const kw=(modalBox.querySelector('#fsk').value+modalBox.querySelector('#fsc').value+modalBox.querySelector('#fsn').value).trim();cur=kw?STORE_DATA.filter(r=>(r[0]+r[1]).includes(kw)):STORE_DATA.slice();draw(cur);};
  modalBox.querySelector('#sf').onclick=flt;modalBox.querySelector('#srl').onclick=flt;
  modalBox.querySelector('#sap').onclick=()=>{const p=[...body.querySelectorAll('.sc:checked')].map(c=>cur[+c.value]);if(!p.length){alert('매장을 선택하세요.');return;}setBoxValue(boxId,p.length===1?p[0][1]:`${p[0][1]} 외 ${p.length-1}건`);closeModal();};
}
function buildProd(boxId){
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">상품선택</span><button class="x" data-x>&times;</button></div><div class="modal-body">
    <table class="m-search"><tr><td class="ml">상품코드</td><td><input id="fpc"></td><td class="ml">상품명</td><td><input id="fpn"></td></tr></table>
    <div class="m-btns"><button class="btn btn-sm" id="prl">조회</button><button class="btn btn-primary btn-sm" id="pap">선택</button></div>
    <div class="m-grid-wrap"><table class="m-grid"><thead><tr><th class="chk"><input type="checkbox" id="pall"></th><th>상품코드</th><th>상품명</th></tr></thead><tbody id="pbody"></tbody></table></div></div>`;
  bindX();const body=modalBox.querySelector('#pbody');let cur=PROD_DATA.slice();
  const draw=l=>{body.innerHTML=l.map((r,i)=>`<tr><td class="chk"><input type="checkbox" class="pc" value="${i}"></td><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');body.querySelectorAll('tr').forEach(tr=>tr.onclick=e=>{if(e.target.type!=='checkbox'){const c=tr.querySelector('.pc');c.checked=!c.checked;}});};
  draw(cur);
  modalBox.querySelector('#pall').onchange=e=>body.querySelectorAll('.pc').forEach(c=>c.checked=e.target.checked);
  const flt=()=>{const kw=(modalBox.querySelector('#fpc').value+modalBox.querySelector('#fpn').value).trim();cur=kw?PROD_DATA.filter(r=>(r[0]+r[1]).includes(kw)):PROD_DATA.slice();draw(cur);};
  modalBox.querySelector('#prl').onclick=flt;
  modalBox.querySelector('#pap').onclick=()=>{const p=[...body.querySelectorAll('.pc:checked')].map(c=>cur[+c.value]);if(!p.length){alert('상품을 선택하세요.');return;}setBoxValue(boxId,p.length===1?p[0][1]:`${p[0][1]} 외 ${p.length-1}건`);closeModal();};
}
function buildCat(boxId){
  let tree='<div class="tree"><ul>';
  CAT_TREE.forEach((g,gi)=>{tree+=`<li><span class="tw" data-tw="${gi}">▾</span><label><input type="checkbox" class="cp" data-g="${gi}"> <b>${g.name}</b></label><ul data-ul="${gi}">${g.children.map(c=>`<li><label><input type="checkbox" class="cc" data-g="${gi}"> ${c}</label></li>`).join('')}</ul></li>`;});
  tree+='</ul></div>';
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">분류조회</span><button class="x" data-x>&times;</button></div><div class="modal-body">${tree}<div class="m-btns" style="margin-top:12px;"><button class="btn btn-primary btn-sm" id="cap">선택</button><button class="btn btn-sm" data-x>취소</button></div></div>`;
  bindX();
  modalBox.querySelectorAll('[data-tw]').forEach(tw=>tw.onclick=()=>{const ul=modalBox.querySelector(`[data-ul="${tw.dataset.tw}"]`);const h=ul.style.display==='none';ul.style.display=h?'':'none';tw.textContent=h?'▾':'▸';});
  modalBox.querySelectorAll('.cp').forEach(p=>p.onchange=()=>modalBox.querySelectorAll(`.cc[data-g="${p.dataset.g}"]`).forEach(c=>c.checked=p.checked));
  modalBox.querySelector('#cap').onclick=()=>{const names=[];CAT_TREE.forEach((g,gi)=>{const parent=modalBox.querySelector(`.cp[data-g="${gi}"]`);const kids=[...modalBox.querySelectorAll(`.cc[data-g="${gi}"]`)];if(parent.checked&&kids.every(k=>k.checked))names.push(g.name);else kids.forEach((k,ki)=>{if(k.checked)names.push(g.name+'>'+g.children[ki]);});});if(!names.length){alert('분류를 선택하세요.');return;}setBoxValue(boxId,names.length===1?names[0]:`${names[0]} 외 ${names.length-1}건`);closeModal();};
}
function buildCustomModal(p,boxId){
  const searchRows=[];for(let i=0;i<p.fields.length;i+=2)searchRows.push([p.fields[i],p.fields[i+1]||null]);
  const fieldCtrl=f=>{if(!f)return '<td class="ml"></td><td></td>';let ctrl;if(f.type==='combo')ctrl=`<select>${(f.options||[]).map(o=>`<option>${esc(o)}</option>`).join('')||'<option>전체</option>'}</select>`;else if(f.type==='date')ctrl=`<input value="${todayStr()}" readonly>`;else ctrl='<input>';return `<td class="ml">${esc(f.label)}</td><td>${ctrl}</td>`;};
  const cols=p.columns.length?p.columns:['코드','명칭'];
  const data=p.data&&p.data.length?p.data:[cols.map(c=>c+' 예시')];
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">${esc(p.name)}</span><button class="x" data-x>&times;</button></div><div class="modal-body">
    <table class="m-search">${searchRows.map(r=>`<tr>${fieldCtrl(r[0])}${fieldCtrl(r[1])}</tr>`).join('')||'<tr><td class="ml">검색</td><td><input></td><td></td><td></td></tr>'}</table>
    <div class="m-btns"><button class="btn btn-sm" id="crl">조회</button><button class="btn btn-primary btn-sm" id="cap2">선택</button></div>
    <div class="m-grid-wrap"><table class="m-grid"><thead><tr><th class="chk"><input type="checkbox" id="call"></th>${cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody id="cpbody"></tbody></table></div></div>`;
  bindX();const body=modalBox.querySelector('#cpbody');
  const draw=l=>{body.innerHTML=l.map((r,i)=>`<tr><td class="chk"><input type="checkbox" class="cpc" value="${i}"></td>${cols.map((c,ci)=>`<td>${esc(String(r[ci]==null?'':r[ci]))}</td>`).join('')}</tr>`).join('');body.querySelectorAll('tr').forEach(tr=>tr.onclick=e=>{if(e.target.type!=='checkbox'){const c=tr.querySelector('.cpc');c.checked=!c.checked;}});};
  draw(data);
  modalBox.querySelector('#call').onchange=e=>body.querySelectorAll('.cpc').forEach(c=>c.checked=e.target.checked);
  modalBox.querySelector('#crl').onclick=()=>draw(data);
  modalBox.querySelector('#cap2').onclick=()=>{const sel=[...body.querySelectorAll('.cpc:checked')].map(c=>data[+c.value]);if(!sel.length){alert('항목을 선택하세요.');return;}const label=r=>String(r[1]==null?r[0]:r[1]);setBoxValue(boxId,sel.length===1?label(sel[0]):`${label(sel[0])} 외 ${sel.length-1}건`);closeModal();};
}

/* ================= 팝업 만들기(빌더) ================= */
$('newPopupBtn').onclick=()=>openPopupBuilder();
function openPopupBuilder(existing){
  const draft=existing?JSON.parse(JSON.stringify(existing)):{id:null,name:'',fields:[],columns:[],data:[]};
  const renderFields=()=>modalBox.querySelector('#pbFields').innerHTML=draft.fields.length?draft.fields.map((f,i)=>`<div class="pf-item"><span class="t">${f.type==='combo'?'콤보':f.type==='date'?'일자':'텍스트'}</span><span class="nm">${esc(f.label)}${f.type==='combo'&&f.options.length?` <span style="color:#8794a6">(${esc(f.options.join(', '))})</span>`:''}</span><button class="rm" data-fi="${i}">✕</button></div>`).join(''):'<div class="pop-none">조회조건을 추가하세요.</div>';
  const renderCols=()=>modalBox.querySelector('#pbCols').innerHTML=draft.columns.length?draft.columns.map((c,i)=>`<div class="pf-item"><span class="nm">${esc(c)}</span><button class="rm" data-ci="${i}">✕</button></div>`).join(''):'<div class="pop-none">결과 컬럼을 추가하세요.</div>';
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">🪟 팝업 만들기</span><button class="x" data-x>&times;</button></div><div class="modal-body">
    <div class="pb-row"><label>팝업명</label><input class="b-txt" id="pbName" style="flex:1" placeholder="예: 사원선택, 거래처선택" value="${esc(draft.name)}"></div>
    <div class="pb-sub">① 팝업 조회조건</div>
    <div class="pb-row"><input class="b-txt" id="pbFieldLbl" style="width:150px" placeholder="조건명 (예: 사원명)"><select class="b-sel" id="pbFieldType"><option value="text">텍스트</option><option value="combo">콤보박스</option><option value="date">일자</option></select><input class="b-txt" id="pbFieldOpts" style="flex:1" placeholder="콤보 옵션(쉼표, 콤보일 때)"><button class="type-btn accent" id="pbAddField">＋ 조건</button></div>
    <div class="pf-list" id="pbFields"></div>
    <div class="pb-sub">② 팝업 결과 컬럼</div>
    <div class="pb-row"><input class="b-txt" id="pbColName" style="flex:1" placeholder="컬럼명 (예: 사원번호)"><button class="type-btn accent" id="pbAddCol">＋ 컬럼</button></div>
    <div class="pf-list" id="pbCols"></div>
    <div class="pb-sub">③ 팝업 데이터 (선택)</div>
    <p class="hint-line">한 줄=한 행, 셀은 탭 또는 쉼표로 구분. 비우면 예시 1행 자동 생성.</p>
    <textarea class="paste-ta" id="pbData" style="min-height:80px" placeholder="E1001, 홍길동, 영업팀">${(draft.data||[]).map(r=>r.join(', ')).join('\n')}</textarea>
    <div class="m-btns" style="margin-top:14px;"><button class="btn btn-sm" data-x>취소</button><button class="btn btn-primary btn-sm" id="pbSave">${existing?'수정 저장':'팝업 저장'}</button></div></div>`;
  openModal(true);bindX();renderFields();renderCols();
  modalBox.querySelector('#pbAddField').onclick=()=>{const lbl=modalBox.querySelector('#pbFieldLbl').value.trim();const type=modalBox.querySelector('#pbFieldType').value;const opts=modalBox.querySelector('#pbFieldOpts').value.split(',').map(s=>s.trim()).filter(Boolean);if(!lbl){alert('조건명을 입력하세요.');return;}draft.fields.push({label:lbl,type,options:opts});modalBox.querySelector('#pbFieldLbl').value='';modalBox.querySelector('#pbFieldOpts').value='';renderFields();};
  modalBox.querySelector('#pbAddCol').onclick=()=>{const nm=modalBox.querySelector('#pbColName').value.trim();if(!nm){alert('컬럼명을 입력하세요.');return;}draft.columns.push(nm);modalBox.querySelector('#pbColName').value='';renderCols();};
  modalBox.querySelector('#pbFields').onclick=e=>{const b=e.target.closest('[data-fi]');if(b){draft.fields.splice(+b.dataset.fi,1);renderFields();}};
  modalBox.querySelector('#pbCols').onclick=e=>{const b=e.target.closest('[data-ci]');if(b){draft.columns.splice(+b.dataset.ci,1);renderCols();}};
  modalBox.querySelector('#pbSave').onclick=()=>{const name=modalBox.querySelector('#pbName').value.trim();if(!name){alert('팝업명을 입력하세요.');return;}if(!draft.columns.length){alert('결과 컬럼을 1개 이상 추가하세요.');return;}const raw=modalBox.querySelector('#pbData').value.trim();draft.data=raw?raw.split(/\r?\n/).filter(Boolean).map(line=>line.split(/\t|,/).map(s=>s.trim())):[];draft.name=name;if(existing){const idx=state.popups.findIndex(p=>p.id===existing.id);state.popups[idx]=Object.assign(existing,draft);}else{draft.id='p'+(seq++);state.popups.push(draft);}closeModal();render();};
}
function renderPopChips(){
  const box=$('popChips');
  if(!state.popups.length){box.innerHTML='<span class="pop-none">만든 팝업이 없습니다. ‘팝업 만들기’로 팝업명·조회조건을 정의하세요.</span>';return;}
  box.innerHTML=state.popups.map(p=>`<span class="pop-chip">🪟 ${esc(p.name)}<button class="mini view" data-pview="${p.id}" title="미리보기">👁</button><button class="mini add" data-padd="${p.id}" title="조회조건으로 추가">＋</button><button class="mini edit" data-pedit="${p.id}" title="수정">✎</button><button class="mini x" data-pdel="${p.id}" title="삭제">✕</button></span>`).join('');
}
$('popChips').addEventListener('click',e=>{

const FT_LIST=[['text','텍스트'],['readonly','읽기전용'],['dropdown','드롭다운'],['textarea','텍스트영역'],['date','날짜'],['checkboxGroup','체크박스그룹'],['checkbox','체크박스'],['breadcrumb','분류(경로)'],['popupSelect','팝업선택'],['withButton','버튼형'],['image','이미지'],['note','안내문']];
const FT_OPTS=FT_LIST.map(x=>`<option value="${x[0]}">${x[1]}</option>`).join('');
function ftLabel(t){const f=FT_LIST.find(x=>x[0]===t);return f?f[1]:t;}
function ifField(f){
  const v=f.value||'';
  switch(f.type){
    case 'readonly': return `<input class="if-input" readonly value="${esc(v)}">`;
    case 'dropdown': {const o=(f.options&&f.options.length)?f.options:[v];return `<select class="if-input">${o.map(x=>`<option ${String(x)===String(v)?'selected':''}>${esc(x)}</option>`).join('')}</select>`;}
    case 'textarea': return `<textarea class="if-ta">${esc(v)}</textarea>`;
    case 'date': return `<div class="if-popupsel"><input class="if-input" value="${esc(v||todayStr())}" readonly><button class="if-btn" type="button" style="background:#fff;color:#5b6470;border-color:#d3dce8;">▼</button></div>`;
    case 'checkboxGroup': {const chk=v?String(v).split(',').map(s=>s.trim()):[];return `<div class="if-chk-group">${(f.options||[]).map(x=>`<label class="if-chk"><input type="checkbox" ${chk.includes(x)?'checked':''}>${esc(x)}</label>`).join('')}</div>`;}
    case 'checkbox': return `<label class="if-chk"><input type="checkbox" ${truthy(v)?'checked':''}></label>`;
    case 'breadcrumb': return `<div class="if-breadcrumb">${esc(v||'-')}</div>`;
    case 'popupSelect': return `<div class="if-popupsel"><div class="box ${v?'':'empty'}">${esc(v||(f.label+' 선택'))}</div><button class="btn btn-sm btn-selcancel" type="button">선택취소</button></div>`;
    case 'withButton': return `<div class="if-popupsel"><input class="if-input" value="${esc(v)}"><button class="if-btn" type="button">${esc((f.options&&f.options[0])||'생성')}</button></div>`;

    case 'note': return `<div class="if-note">${esc(v||'준비중 입니다.')}</div>`;
    default: return `<input class="if-input" value="${esc(v)}">`;
  }
}
function renderInfoGrid(sec){
  const cols=sec.columns||[], rows=sec.rows||[];
  const cls=c=>c.align==='l'?'l':(c.align==='r'?'r':'');
  const isNum=c=>!c.nosum&&(c.align==='r'||['comma','won','percent'].includes(c.format));
  const sum=ci=>{let s=0,has=false;rows.forEach(r=>{const n=Number(String(r[ci]==null?'':r[ci]).replace(/,/g,''));if(!isNaN(n)&&String(r[ci]).trim()!==''){s+=n;has=true;}});return has?s:null;};
  let h=`<div class="iform-sec">${sec.title?`<div class="iform-sec-hd">${esc(sec.title)}</div>`:''}<div class="if-grid-wrap"><table class="if-grid">`;
  h+='<thead><tr>';
  if(sec.rownum!==false) h+='<th class="gcol">⚙</th>';
  cols.forEach(c=>h+=`<th${c.width?` style="min-width:${c.width}px"`:''}>${esc(c.name)}</th>`);
  h+='</tr></thead><tbody>';
  if(!rows.length) h+=`<tr><td class="l" colspan="${cols.length+(sec.rownum!==false?1:0)}"><div class="if-grid-empty">조회된 내역이 없습니다.</div></td></tr>`;
  rows.forEach((r,ri)=>{
    h+=`<tr class="${sec.sel===ri?'sel':''}">`;
    if(sec.rownum!==false) h+=`<td class="no">${ri+1}</td>`;
    cols.forEach((c,ci)=>h+=`<td class="${cls(c)}${sec.sel===ri&&ci===0?' hi':''}">${fmtCell(r[ci],c)||'&nbsp;'}</td>`);
    h+='</tr>';
  });
  h+='</tbody>';
  if(sec.sum){
    h+='<tfoot><tr>';
    if(sec.rownum!==false) h+='<td class="lbl">합계</td>';
    cols.forEach((c,ci)=>{const s=isNum(c)?sum(ci):null;h+=`<td class="${cls(c)}">${s==null?'&nbsp;':fmtCell(s,c)}</td>`;});
    h+='</tr></tfoot>';
  }
  h+='</table></div></div>';
  return h;
}
function renderInfoSection(sec){
  if(sec.kind==='grid') return renderInfoGrid(sec);
  const one=(sec.cols||2)===1, rows=[]; let buf=[];
  (sec.fields||[]).forEach(f=>{
    if(f.span===2||one){ if(buf.length){rows.push(buf);buf=[];} rows.push([f]); }
    else { buf.push(f); if(buf.length===2){rows.push(buf);buf=[];} }
  });
  if(buf.length)rows.push(buf);
  const cg=one?'<colgroup><col style="width:130px"><col></colgroup>':'<colgroup><col style="width:130px"><col><col style="width:130px"><col></colgroup>';
  let h=`<div class="iform-sec">${sec.title?`<div class="iform-sec-hd">${esc(sec.title)}</div>`:''}<table class="iform-tbl">${cg}`;
  rows.forEach(r=>{
    h+='<tr>';
    if(r.length===1){const f=r[0];
      if(f.type==='note'&&!f.label){h+=`<td class="if-note-cell" colspan="${one?2:4}">${ifField(f)}</td>`;}
      else h+=`<th>${esc(f.label)}</th><td colspan="${one?1:3}">${ifField(f)}</td>`;}
    else r.forEach(f=>h+=`<th>${esc(f.label)}</th><td>${ifField(f)}</td>`);
    h+='</tr>';
  });
  h+='</table></div>';
  return h;
}

function applyPopupPreset(key){
  const p=POPUP_PRESETS[key](); p.id='p'+(seq++); state.popups.push(p);
  closeModal(); render(); buildCustomModal(p,'__preview__'); openModal(true);
}
function sampleCards(list,attr,icon){
  return `<div class="preset-grid">${list.map(it=>`<div class="preset-card" data-${attr}="${it[0]}"><div class="pt">${icon} ${esc(it[1])}</div><div class="pd">${esc(it[2])}</div></div>`).join('')}</div>`;
}
function openPopupSamples(kind){
  const secPop=`<div class="pb-sub" data-s0>🪟 조회조건 팝업 (${POPUP_SAMPLES.length}) · 조회조건에 붙여 코드/명칭을 선택</div>${sampleCards(POPUP_SAMPLES,'poppreset','🪟')}`;
  const secInfo=`<div class="pb-sub" data-s0>🗂️ 정보·작업 팝업 (${INFO_SAMPLES.length}) · 결과 그리드의 링크 컬럼에 연결</div>${sampleCards(INFO_SAMPLES,'infopreset','🗂️')}`;
  modalBox.innerHTML=`<div class="modal-hd"><span class="mt">📚 팝업예시 (총 ${POPUP_SAMPLES.length+INFO_SAMPLES.length})</span><button class="x" data-x>&times;</button></div>
  <div class="modal-body">
    <p class="hint-line">카드를 누르면 현재 구성에 팝업이 바로 생성되고 미리보기로 열립니다. 생성된 팝업은 아래 칩에서 연결·수정·삭제할 수 있습니다.</p>
    ${kind==='info'?secInfo+secPop:secPop+secInfo}
  </div>`;
  openModal(true); bindX();
  const first=modalBox.querySelector('[data-s0]');
  if(first) first.style.cssText='margin-top:0;border-top:none;padding-top:0;';
  modalBox.querySelectorAll('[data-poppreset]').forEach(el=>el.onclick=()=>applyPopupPreset(el.dataset.poppreset));
  modalBox.querySelectorAll('[data-infopreset]').forEach(el=>el.onclick=()=>applyInfoPreset(el.dataset.infopreset));
}
$('popupSampleBtn').onclick=()=>openPopupSamples('popup');
$('infoSampleBtn').onclick =()=>openPopupSamples('info');
